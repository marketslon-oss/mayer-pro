<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>План Кошторис</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; padding: 10px; color: #333; margin: 0; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .user-info-box { background: #eef2f3; padding: 10px; border-radius: 8px; border-left: 4px solid #248b65; margin-bottom: 15px; font-size: 13px; }
        label { display: block; font-weight: bold; margin-top: 8px; font-size: 12px; color: #555; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; margin-top: 4px; box-sizing: border-box; font-size: 14px; }
        .readonly-input { background: #eee; color: #666; cursor: not-allowed; }
        .row { display: flex; gap: 8px; }
        .row > div { flex: 1; }
        .total { background: #e8f5e9; padding: 12px; border-radius: 8px; text-align: center; margin-top: 15px; border: 1px solid #2e7d32; color: #2e7d32; font-weight: bold; font-size: 18px; }
        button { width: 100%; padding: 14px; background: #4caf50; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <div class="user-info-box">
            <label>👤 ПІБ:</label>
            <input type="text" id="user_name" class="readonly-input" readonly placeholder="Завантаження...">
            <div class="row">
                <div>
                    <label>💼 Посада:</label>
                    <input type="text" id="user_role" class="readonly-input" readonly>
                </div>
                <div>
                    <label>🏢 Відділ:</label>
                    <input type="text" id="user_dept" class="readonly-input" readonly>
                </div>
            </div>
        </div>

        <label>🎯 Мета відрядження:</label>
        <input type="text" id="purpose" placeholder="Мета поїздки">

        <label>📍 Маршрут:</label>
        <input type="text" id="destination" placeholder="Звідки - Куди">

        <div class="row">
            <div>
                <label>📅 Виїзд:</label>
                <input type="date" id="date_start" onchange="calculateDays()">
            </div>
            <div>
                <label>📅 Прибуття:</label>
                <input type="date" id="date_end" onchange="calculateDays()">
            </div>
        </div>

        <div class="row">
            <div>
                <label>🔢 Кількість діб:</label>
                <input type="number" id="days_count" value="1" class="readonly-input" readonly>
            </div>
            <div>
                <label>🚗 Автомобіль:</label>
                <select id="car_select" onchange="calculateFuel()">
                    <option value="6.5">Opel Combo (6.5л/100км)</option>
                    <option value="8.4">Toyota Corolla (8.4л/100км)</option>
                    <option value="6.5">Renault Duster (6.5л/100км)</option>
                </select>
            </div>
        </div>

        <div class="row">
            <div>
                <label>🛣️ Плановий км:</label>
                <input type="number" id="planned_km" placeholder="0" oninput="calculateFuel()">
            </div>
            <div>
                <label>💰 Ціна грн/л:</label>
                <input type="number" id="fuel_price" placeholder="Введіть ціну" oninput="calculateFuel()">
            </div>
        </div>

        <div class="row" style="background: #f9f9f9; padding: 5px; border-radius: 8px; border: 1px dashed #ccc;">
            <div>
                <label>⛽ Літри (авто):</label>
                <input type="number" id="fuel_liters" class="readonly-input" readonly>
            </div>
            <div>
                <label>💵 Сума ПММ:</label>
                <input type="number" id="fuel_sum" class="readonly-input" readonly>
            </div>
        </div>

        <div class="row">
            <div>
                <label>🏨 Проживання:</label>
                <input type="number" id="hotel" placeholder="0" oninput="calculateTotal()">
            </div>
            <div>
                <label>🍔 Добові (1 доба):</label>
                <input type="number" id="per_diem" placeholder="Введіть суму" oninput="calculateTotal()">
            </div>
        </div>

        <div class="total" id="total_display">РАЗОМ: 0 грн</div>
        <button onclick="sendData()">💾 Зберегти план</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Отримання даних користувача з URL (переданих ботом)
        const urlParams = new URLSearchParams(window.location.search);
        const userDataStr = urlParams.get('user');
        if (userDataStr) {
            try {
                const userData = JSON.parse(decodeURIComponent(userDataStr));
                document.getElementById('user_name').value = userData.pib || "";
                document.getElementById('user_role').value = userData.posada || "";
                document.getElementById('user_dept').value = userData.viddil || "";
            } catch (e) { console.error("Data error", e); }
        }

        // Автоматичний розрахунок кількості діб
        function calculateDays() {
            const startVal = document.getElementById('date_start').value;
            const endVal = document.getElementById('date_end').value;
            if (startVal && endVal) {
                const start = new Date(startVal);
                const end = new Date(endVal);
                if (end >= start) {
                    const diff = Math.abs(end - start);
                    const days = Math.ceil(diff / (1000 * 60 * 60 * 24)) + 1;
                    document.getElementById('days_count').value = days;
                    calculateTotal();
                }
            }
        }

        // Розрахунок літрів та вартості пального
        function calculateFuel() {
            const consumption = parseFloat(document.getElementById('car_select').value);
            const km = parseFloat(document.getElementById('planned_km').value) || 0;
            const price = parseFloat(document.getElementById('fuel_price').value) || 0;
            const liters = (km * consumption) / 100;
            const sum = liters * price;
            document.getElementById('fuel_liters').value = liters.toFixed(1);
            document.getElementById('fuel_sum').value = Math.round(sum);
            calculateTotal();
        }

        // Загальна сума (ПММ + Готель + (Добові * Дні))
        function calculateTotal() {
            const fuelSum = parseFloat(document.getElementById('fuel_sum').value) || 0;
            const hotel = parseFloat(document.getElementById('hotel').value) || 0;
            const perDiem = parseFloat(document.getElementById('per_diem').value) || 0;
            const days = parseFloat(document.getElementById('days_count').value) || 1;
            const total = fuelSum + hotel + (perDiem * days);
            document.getElementById('total_display').innerText = `РАЗОМ: ${Math.round(total)} грн`;
            return total;
        }

        // Відправка даних у бот
        function sendData() {
            const data = {
                pib: document.getElementById('user_name').value,
                posada: document.getElementById('user_role').value,
                viddil: document.getElementById('user_dept').value,
                purpose: document.getElementById('purpose').value,
                destination: document.getElementById('destination').value,
                date_start: document.getElementById('date_start').value,
                date_end: document.getElementById('date_end').value,
                days_count: document.getElementById('days_count').value,
                car: document.getElementById('car_select').options[document.getElementById('car_select').selectedIndex].text,
                planned_km: document.getElementById('planned_km').value,
                fuel_price: document.getElementById('fuel_price').value,
                fuel_liters: document.getElementById('fuel_liters').value,
                fuel_sum: document.getElementById('fuel_sum').value,
                hotel: document.getElementById('hotel').value,
                per_diem: document.getElementById('per_diem').value,
                total: calculateTotal()
            };
            tg.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
