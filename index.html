<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>План Кошторис v2.0</title> 
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; padding: 10px; margin: 0; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .user-header { background: #f1f1f1; padding: 12px; border-radius: 10px; margin-bottom: 15px; font-size: 13px; border-left: 5px solid #71a95e; }
        label { display: block; font-weight: bold; margin-top: 10px; font-size: 11px; color: #555; text-transform: uppercase; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; margin-top: 4px; box-sizing: border-box; font-size: 14px; }
        .row { display: flex; gap: 10px; align-items: flex-start; }
        .row > div { flex: 1; }
        .gray-field { background: #f9f9f9; color: #444; font-weight: bold; border: 1px dashed #bbb; }
        .total-box { background: #eef7ee; color: #2e7d32; border: 1px solid #2e7d32; padding: 12px; border-radius: 8px; text-align: center; margin-top: 15px; font-weight: bold; font-size: 18px; }
        .btn-save { width: 100%; padding: 15px; background: #71a95e; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; margin-top: 15px; cursor: pointer; }
        
        /* Валідація без вікон */
        .error-hint { color: #d32f2f; font-size: 10px; font-weight: bold; margin-top: 4px; display: none; }
        .invalid { border: 2px solid #ff4d4d !important; }
    </style>
</head>
<body>
    <div class="card">
        <div class="user-header">
            <b>ПІБ:</b> <span id="pib">...</span> (<b>ПІБ:</b> <span id="pib_ru">...</span>)<br>
            <b>Посада:</b> <span id="posada">...</span> (<b>Должность:</b> <span id="posada_ru">...</span>)
        </div>

        <label>🎯 МЕТА (ЦЕЛЬ):</label>
        <input type="text" id="purpose">
        <div id="err_p" class="error-hint">Заповніть мету! (Заполните цель!)</div>

        <label>📍 МАРШРУТ:</label>
        <input type="text" id="destination">
        <div id="err_d" class="error-hint">Вкажіть маршрут! (Укажите маршрут!)</div>

        <div class="row">
            <div><label>📅 ВИЇЗД (ВЫЕЗД):</label><input type="date" id="date_start" onchange="calculate()"></div>
            <div><label>📅 ПРИБУТТЯ (ПРИБЫТИЕ):</label><input type="date" id="date_end" onchange="calculate()"></div>
        </div>

        <label>🚗 АВТОМОБІЛЬ (АВТОМОБИЛЬ):</label>
        <select id="car" onchange="calculate()">
            <option value="6.5">Opel Combo (KA1197MO)</option>
            <option value="8.4">Toyota Corolla (KA4730AP)</option>
            <option value="6.5">Renault Duster (KA0144РК)</option>
        </select>

        <div class="row">
            <div><label>🗺️ КМ:</label><input type="number" id="km" value="0" oninput="calculate()"></div>
            <div><label>💰 ЦІНА ПАЛЬНОГО (ЦЕНА):</label><input type="number" id="price" value="0" oninput="calculate()"></div>
        </div>

        <div class="row">
            <div><label>🏨 ГОТЕЛЬ (ОТЕЛЬ):</label><input type="number" id="hotel" value="0" oninput="calculate()"></div>
            <div><label>🍔 ДОБОВІ (СУТОЧНЫЕ):</label><input type="number" id="per_diem" value="0" oninput="calculate()"></div>
        </div>

        <div class="total-box" id="total_display">РАЗОМ (ИТОГО): 0 грн</div>
        
        <button class="btn-save" id="save_btn" onclick="fastSend()">💾 Зберегти (Сохранить)</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        const name = urlParams.get('pib') || 'Користувач';
        document.getElementById('pib').innerText = name;
        document.getElementById('pib_ru').innerText = name;
        document.getElementById('posada').innerText = urlParams.get('pos') || '---';

        function calculate() {
            const sVal = document.getElementById('date_start').value;
            const eVal = document.getElementById('date_end').value;
            const km = parseFloat(document.getElementById('km').value) || 0;
            const price = parseFloat(document.getElementById('price').value) || 0;
            const cons = parseFloat(document.getElementById('car').value) || 6.5;
            const hotel = parseFloat(document.getElementById('hotel').value) || 0;
            const perDiem = parseFloat(document.getElementById('per_diem').value) || 0;

            let days = 0;
            if (sVal && eVal) {
                const s = new Date(sVal), e = new Date(eVal);
                if (e >= s) days = Math.ceil((e - s) / (1000 * 60 * 60 * 24)) + 1;
            }

            let fuelSum = Math.round((km * cons / 100) * price);
            const total = fuelSum + hotel + (perDiem * days);
            document.getElementById('total_display').innerText = `РАЗОМ: ${Math.round(total) || 0} грн`;
            return { total, fuelSum, days };
        }

        function fastSend() {
            const p = document.getElementById('purpose');
            const d = document.getElementById('destination');
            const k = document.getElementById('km');
            
            // Скидаємо помилки
            p.classList.remove('invalid'); d.classList.remove('invalid'); k.classList.remove('invalid');
            document.getElementById('err_p').style.display = 'none';
            document.getElementById('err_d').style.display = 'none';

            // Тільки критична перевірка
            let hasError = false;
            if (!p.value.trim()) { p.classList.add('invalid'); document.getElementById('err_p').style.display = 'block'; hasError = true; }
            if (!d.value.trim()) { d.classList.add('invalid'); document.getElementById('err_d').style.display = 'block'; hasError = true; }
            if (parseFloat(k.value) <= 0) { k.classList.add('invalid'); hasError = true; }

            if (hasError) {
                tg.HapticFeedback.notificationOccurred('error');
                return;
            }

            const btn = document.getElementById('save_btn');
            btn.disabled = true;
            btn.innerText = "⏳...";

            const res = calculate();
            const data = {
                pib: name,
                purpose: p.value.trim(),
                destination: d.value.trim(),
                total: res.total,
                km: k.value,
                fuel_sum: res.fuelSum
            };

            tg.sendData(JSON.stringify(data));
            // Закриваємо миттєво, щоб не було відчуття зависання
            tg.close();
        }
    </script>
</body>
</html>
