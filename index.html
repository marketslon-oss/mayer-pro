<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>План Кошторис</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; padding: 10px; margin: 0; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .user-header { background: #f1f1f1; padding: 12px; border-radius: 10px; margin-bottom: 15px; font-size: 13px; border-left: 5px solid #71a95e; }
        label { display: block; font-weight: bold; margin-top: 10px; font-size: 11px; color: #555; text-transform: uppercase; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; margin-top: 4px; box-sizing: border-box; font-size: 14px; }
        .row { display: flex; gap: 10px; align-items: flex-start; }
        .row > div { flex: 1; }
        .gray-field { background: #f9f9f9; color: #444; font-weight: bold; border: 1px dashed #bbb; }
        .total-box { background: #eef7ee; color: #2e7d32; border: 1px solid #2e7d32; padding: 12px; border-radius: 8px; text-align: center; margin-top: 15px; font-weight: bold; font-size: 18px; }
        .btn-save { width: 100%; padding: 15px; background: #71a95e; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; margin-top: 15px; cursor: pointer; }
        .btn-upload { background: #5d8aa8; padding: 10px; font-size: 12px; margin-top: 5px; color: white; border: none; border-radius: 5px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <div class="user-header">
            <b>ПІБ:</b> <span id="pib">Завантаження...</span><br>
            <b>Посада:</b> <span id="posada">...</span><br>
            <b>Відділ:</b> <span id="viddil">...</span>
        </div>

        <label>🎯 МЕТА ВІДРЯДЖЕННЯ:</label>
        <input type="text" id="purpose" placeholder="Введіть мету">

        <label>📍 МАРШРУТ:</label>
        <input type="text" id="destination" placeholder="Звідки - Куди">

        <div class="row">
            <div><label>📅 ВИЇЗД:</label><input type="date" id="date_start" onchange="calculate()"></div>
            <div><label>📅 ПРИБУТТЯ:</label><input type="date" id="date_end" onchange="calculate()"></div>
        </div>

        <label>🚗 АВТОМОБІЛЬ:</label>
        <select id="car" onchange="calculate()">
            <option value="6.5">Opel Combo (KA1197MO) — 6.5л</option>
            <option value="8.4">Toyota Corolla (KA4730AP) — 8.4л</option>
            <option value="6.5">Renault Duster (KA0144РК) — 6.5л</option>
        </select>

        <div class="row">
            <div><label>🗺️ ПЛАНОВИЙ КМ:</label><input type="number" id="km" value="0" oninput="calculate()"></div>
            <div><label>💰 ЦІНА ПАЛЬНОГО:</label><input type="number" id="price" value="0" oninput="calculate()"></div>
        </div>

        <div class="row">
            <div><label>🔢 К-СТЬ ДІБ:</label><input type="number" id="days" class="gray-field" readonly value="1"></div>
            <div><label>⛽ ЛІТРИ (АВТО):</label><input type="text" id="liters" class="gray-field" readonly value="0"></div>
        </div>

        <div class="row">
            <div><label>💵 СУМА ПММ:</label><input type="text" id="fuel_sum" class="gray-field" readonly value="0"></div>
            <div><label>🏨 ГОТЕЛЬ:</label><input type="number" id="hotel" value="0" oninput="calculate()"></div>
        </div>

        <label>🍔 ДОБОВІ (ЗА 1 ДОБУ):</label>
        <input type="number" id="per_diem" value="0" oninput="calculate()">

        <label>📎 ДОДАТИ ДОКУМЕНТИ:</label>
        <div class="row">
            <div><button type="button" class="btn-upload" onclick="document.getElementById('f1').click()">📁 ФАЙЛ</button><input type="file" id="f1" style="display:none"></div>
            <div><button type="button" class="btn-upload" onclick="document.getElementById('f2').click()">📷 ФОТО</button><input type="file" id="f2" accept="image/*" capture="camera" style="display:none"></div>
        </div>

        <div class="total-box" id="total_display">РАЗОМ: 0 грн</div>
        <button class="btn-save" onclick="sendData()">💾 Зберегти план</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById('pib').innerText = urlParams.get('pib') || 'Користувач';
        document.getElementById('posada').innerText = urlParams.get('pos') || '---';
        document.getElementById('viddil').innerText = urlParams.get('vid') || '---';

        function calculate() {
            const startVal = document.getElementById('date_start').value;
            const endVal = document.getElementById('date_end').value;
            const km = parseFloat(document.getElementById('km').value) || 0;
            const price = parseFloat(document.getElementById('price').value) || 0;
            const consumption = parseFloat(document.getElementById('car').value) || 6.5;
            const hotel = parseFloat(document.getElementById('hotel').value) || 0;
            const perDiem = parseFloat(document.getElementById('per_diem').value) || 0;

            let days = 1;
            if (startVal && endVal) {
                const s = new Date(startVal);
                const e = new Date(endVal);
                if (!isNaN(s) && !isNaN(e) && e >= s) {
                    days = Math.ceil((e - s) / (1000 * 60 * 60 * 24)) + 1;
                }
            }
            document.getElementById('days').value = days;

            const liters = (km * consumption / 100).toFixed(1);
            const fuelSum = Math.round(parseFloat(liters) * price);
            
            document.getElementById('liters').value = liters;
            document.getElementById('fuel_sum').value = fuelSum;

            const total = (isNaN(fuelSum) ? 0 : fuelSum) + hotel + (perDiem * days);
            document.getElementById('total_display').innerText = `РАЗОМ: ${Math.round(total)} грн`;
            
            return { total: Math.round(total) || 0, liters, fuelSum, days };
        }

        function sendData() {
            const res = calculate();
            const formatDate = (val) => {
                if (!val) return "";
                return val.includes('-') ? val.split('-').reverse().join('.') : val;
            };

            const data = {
                pib: document.getElementById('pib').innerText,
                posada: document.getElementById('posada').innerText,
                viddil: document.getElementById('viddil').innerText,
                purpose: document.getElementById('purpose').value,
                destination: document.getElementById('destination').value,
                date_start: formatDate(document.getElementById('date_start').value),
                date_end: formatDate(document.getElementById('date_end').value),
                car: document.getElementById('car').options[document.getElementById('car').selectedIndex].text,
                km: document.getElementById('km').value,
                price: document.getElementById('price').value,
                days_count: res.days,
                fuel_liters: res.liters,
                fuel_sum: res.fuelSum,
                hotel: document.getElementById('hotel').value,
                per_diem: document.getElementById('per_diem').value,
                total: res.total
            };
            tg.sendData(JSON.stringify(data));
            tg.close();
        }
    </script>
</body>
</html>
