<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>План Кошторис v4.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; padding: 10px; margin: 0; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .user-header { background: #f1f1f1; padding: 12px; border-radius: 10px; margin-bottom: 15px; font-size: 13px; border-left: 5px solid #71a95e; }
        label { display: block; font-weight: bold; margin-top: 10px; font-size: 11px; color: #555; text-transform: uppercase; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; margin-top: 4px; box-sizing: border-box; font-size: 14px; transition: 0.3s; }
        .row { display: flex; gap: 10px; align-items: flex-start; }
        .row > div { flex: 1; }
        .gray-field { background: #f9f9f9; color: #444; font-weight: bold; border: 1px dashed #bbb; }
        .total-box { background: #eef7ee; color: #2e7d32; border: 1px solid #2e7d32; padding: 12px; border-radius: 8px; text-align: center; margin-top: 15px; font-weight: bold; font-size: 18px; }
        .btn-save { width: 100%; padding: 15px; background: #71a95e; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <div class="user-header">
            <b>ПІБ:</b> <span id="pib">Завантаження...</span><br>
            <b>Посада:</b> <span id="posada">...</span><br>
            <b>Відділ:</b> <span id="viddil">...</span>
        </div>
        <label>🎯 МЕТА ВІДРЯДЖЕННЯ:</label>
        <input type="text" id="purpose" placeholder="Введіть мету">
        <label>📍 МАРШРУТ:</label>
        <input type="text" id="destination" placeholder="Кропивницький-Київ-Кропивницький">
        <div class="row">
            <div><label>📅 ВИЇЗД:</label><input type="date" id="date_start" onchange="calculate()"></div>
            <div><label>📅 ПРИБУТТЯ:</label><input type="date" id="date_end" onchange="calculate()"></div>
        </div>
        <label>🚗 АВТОМОБІЛЬ:</label>
        <select id="car" onchange="calculate()">
            <option value="6.5">Opel Combo (KA1197MO)</option>
            <option value="8.4">Toyota Corolla (KA4730AP)</option>
            <option value="6.5">Renault Duster (KA0144РК)</option>
        </select>
        <div class="row">
            <div><label>🗺️ ПЛАНОВИЙ КМ:</label><input type="number" id="km" placeholder="0" oninput="calculate()"></div>
            <div><label>💰 ЦІНА ПАЛЬНОГО:</label><input type="number" id="price" placeholder="0" oninput="calculate()"></div>
        </div>
        <div class="row">
            <div><label>🔢 К-СТЬ ДІБ:</label><input type="text" id="days" class="gray-field" readonly></div>
            <div><label>⛽ ЛІТРИ (АВТО):</label><input type="text" id="liters" class="gray-field" readonly></div>
        </div>
        <div class="row">
            <div><label>💵 СУМА ПММ:</label><input type="text" id="fuel_sum" class="gray-field" readonly></div>
            <div><label>🏨 ГОТЕЛЬ:</label><input type="number" id="hotel" placeholder="0" oninput="calculate()"></div>
        </div>
        <label>🍔 ДОБОВІ (ЗА ВСЕ ВІДРЯДЖЕННЯ):</label>
        <input type="number" id="per_diem" placeholder="0" oninput="calculate()">
        <div class="total-box" id="total_display">РАЗОМ: 0 грн</div>
        <button class="btn-save" id="main_btn" onclick="askBeforeSend()">💾 Зберегти план</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById('pib').innerText = urlParams.get('pib') || 'Користувач';
        document.getElementById('posada').innerText = urlParams.get('pos') || '---';
        document.getElementById('viddil').innerText = urlParams.get('vid') || '---';

        function calculate() {
            const sVal = document.getElementById('date_start').value, eVal = document.getElementById('date_end').value;
            const km = parseFloat(document.getElementById('km').value) || 0, price = parseFloat(document.getElementById('price').value) || 0;
            const cons = parseFloat(document.getElementById('car').value) || 6.5;
            const hotel = parseFloat(document.getElementById('hotel').value) || 0, perDiem = parseFloat(document.getElementById('per_diem').value) || 0; 
            let days = 0;
            if (sVal && eVal) {
                const s = new Date(sVal), e = new Date(eVal);
                if (!isNaN(s) && !isNaN(e) && e >= s) days = Math.ceil((e - s) / (1000 * 60 * 60 * 24)) + 1;
            }
            document.getElementById('days').value = days;
            let liters = km > 0 ? (km * cons / 100).toFixed(1) : 0;
            let fuelSum = liters > 0 ? Math.round(parseFloat(liters) * price) : 0;
            document.getElementById('liters').value = liters;
            document.getElementById('fuel_sum').value = fuelSum;
            const total = fuelSum + hotel + perDiem;
            document.getElementById('total_display').innerText = `РАЗОМ: ${Math.round(total)} грн`;
            return { total: Math.round(total), liters, fuelSum, days };
        }

        function askBeforeSend() {
            document.querySelectorAll('input').forEach(i => i.style.borderColor = '#ccc');
            let missing = [];
            const fields = {
                'purpose': 'Мета', 'destination': 'Маршрут', 'date_start': 'Виїзд', 
                'date_end': 'Прибуття', 'km': 'КМ', 'price': 'Ціна', 'per_diem': 'Добові', 'hotel': 'Готель (0 грн)'
            };
            for (let id in fields) {
                let el = document.getElementById(id);
                if (!el.value || parseFloat(el.value) <= 0) {
                    missing.push(fields[id]);
                    el.style.borderColor = 'red';
                }
            }
            let msg = missing.length > 0 ? "⚠️ НЕ ЗАПОВНЕНО:\n• " + missing.join("\n• ") + "\n\nВсе одно відправити?" : "Зберегти план кошторис?";
            tg.showConfirm(msg, (ok) => { if (ok) sendData(); });
        }

        function sendData() {
            const res = calculate();
            const data = {
                type: 'plan_new',
                pib: document.getElementById('pib').innerText,
                purpose: document.getElementById('purpose').value || "---",
                destination: document.getElementById('destination').value || document.getElementById('destination').placeholder,
                date_start: document.getElementById('date_start').value.split('-').reverse().join('.'),
                date_end: document.getElementById('date_end').value.split('-').reverse().join('.'),
                car: document.getElementById('car').options[document.getElementById('car').selectedIndex].text,
                km: document.getElementById('km').value || "0",
                price: document.getElementById('price').value || "0",
                fuel_sum: res.fuelSum.toString(),
                hotel: document.getElementById('hotel').value || "0",
                per_diem: document.getElementById('per_diem').value || "0",
                total: res.total.toString()
            };
            tg.sendData(JSON.stringify(data));
            tg.close();
        }
    </script>
</body>
</html>
