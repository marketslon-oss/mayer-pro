<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест План Кошторис</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; padding: 10px; margin: 0; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        label { display: block; font-weight: bold; margin-top: 10px; font-size: 12px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; margin-top: 4px; box-sizing: border-box; }
        .row { display: flex; gap: 10px; }
        .row > div { flex: 1; }
        .readonly-field { background: #f0f0f0; color: #666; }
        .total-btn { background: #eef7ee; color: #2e7d32; border: 1px solid #2e7d32; padding: 12px; border-radius: 8px; text-align: center; margin-top: 15px; font-weight: bold; font-size: 18px; }
        .save-btn { width: 100%; padding: 15px; background: #71a95e; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <label>🎯 мета відрядження:</label>
        <input type="text" id="purpose" placeholder="Мета поїздки">

        <label>📍 Маршрут:</label>
        <input type="text" id="destination" placeholder="Звідки - Куди">

        <div class="row">
            <div><label>📅 Виїзд:</label><input type="date" id="date_start" onchange="calculate()"></div>
            <div><label>📅 Прибуття:</label><input type="date" id="date_end" onchange="calculate()"></div>
        </div>

        <div class="row">
            <div><label>🔢 Кількість діб:</label><input type="number" id="days_count" class="readonly-field" readonly value="1"></div>
            <div>
                <label>🚗 Автомобіль:</label>
                <select id="car" onchange="calculate()">
                    <option value="6.5">Opel Combo (6.5л)</option>
                    <option value="8.4">Toyota Corolla (8.4л)</option>
                </select>
            </div>
        </div>

        <div class="row">
            <div><label>🗺️ Плановий км:</label><input type="number" id="km" value="0" oninput="calculate()"></div>
            <div><label>💰 Ціна грн/л:</label><input type="number" id="price" value="52" oninput="calculate()"></div>
        </div>

        <div class="row">
            <div><label>⛽ Літри:</label><input type="text" id="fuel_liters" class="readonly-field" readonly></div>
            <div><label>💵 Сума ПММ:</label><input type="text" id="fuel_sum" class="readonly-field" readonly></div>
        </div>

        <div class="row">
            <div><label>🏨 Проживання:</label><input type="number" id="hotel" value="0" oninput="calculate()"></div>
