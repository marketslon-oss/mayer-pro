<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background-color: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); }
        label { display: block; margin-top: 10px; font-size: 14px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { width: 100%; padding: 15px; background: #248b65; color: white; border: none; border-radius: 8px; margin-top: 20px; font-weight: bold; }
        .user-card { background: #f0f0f0; padding: 10px; border-radius: 8px; margin-bottom: 15px; border-left: 5px solid #248b65; color: #333; }
    </style>
</head>
<body>
    <div class="user-card">
        <div id="user_display">Завантаження профілю...</div>
    </div>

    <div class="grid">
        <div>
            <label>Дата виїзду:</label>
            <input type="date" id="date_start">
        </div>
        <div>
            <label>Дата прибуття:</label>
            <input type="date" id="date_end">
        </div>
    </div>

    <label>Мета та Маршрут:</label>
    <input type="text" id="goal" placeholder="Мета">
    <input type="text" id="route" placeholder="Маршрут" style="margin-top:5px;">

    <label>Автомобіль:</label>
    <select id="car">
        <option value="Opel Combo (KA1197MO)">Opel Combo (KA1197MO)</option>
        <option value="Toyota Corolla (KA4730AP)">Toyota Corolla (KA4730AP)</option>
        <option value="Renault Duster (KA0144РК)">Renault Duster (KA0144РК)</option>
    </select>

    <div class="grid">
        <div>
            <label>Кілометраж (км):</label>
            <input type="number" id="km" value="0">
        </div>
        <div>
            <label>Ціна палива (грн/л):</label>
            <input type="number" id="fuel_price" value="0">
        </div>
    </div>

    <label>Планова сума витрат (грн):</label>
    <input type="number" id="total" value="0">

    <button onclick="sendData()">💾 Зберегти план</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Отримуємо дані про користувача з посилання (параметр 'user')
        const urlParams = new URLSearchParams(window.location.search);
        const userData = JSON.parse(urlParams.get('user') || '{}');
        
        if(userData.pib) {
            document.getElementById('user_display').innerHTML = `<b>${userData.pib}</b><br><small>${userData.posada} | ${userData.viddil}</small>`;
        }

        function sendData() {
            let data = {
                date_start: document.getElementById('date_start').value,
                date_end: document.getElementById('date_end').value,
                goal: document.getElementById('goal').value,
                route: document.getElementById('route').value,
                car: document.getElementById('car').value,
                km: document.getElementById('km').value,
                fuel_price: document.getElementById('fuel_price').value,
                total: document.getElementById('total').value
            };
            tg.sendData(JSON.stringify(data));
            tg.close();
        }
    </script>
</body>
</html>
