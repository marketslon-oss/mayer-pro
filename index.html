<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>План Кошторис v2.3</title> 
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; padding: 10px; margin: 0; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .user-header { background: #f1f1f1; padding: 12px; border-radius: 10px; margin-bottom: 15px; font-size: 13px; border-left: 5px solid #71a95e; }
        label { display: block; font-weight: bold; margin-top: 10px; font-size: 11px; color: #555; text-transform: uppercase; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; margin-top: 4px; box-sizing: border-box; font-size: 14px; }
        .row { display: flex; gap: 10px; align-items: flex-start; }
        .row > div { flex: 1; }
        .gray-field { background: #f9f9f9; color: #444; font-weight: bold; border: 1px dashed #bbb; border-radius: 8px; padding: 10px; margin-top: 4px; font-size: 14px; text-align: center; }
        .total-box { background: #eef7ee; color: #2e7d32; border: 1px solid #2e7d32; padding: 12px; border-radius: 8px; text-align: center; margin-top: 15px; font-weight: bold; font-size: 18px; }
        .btn-save { width: 100%; padding: 15px; background: #71a95e; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; margin-top: 15px; cursor: pointer; }
        .invalid { border: 2px solid #ff4d4d !important; background: #fff5f5 !important; }
    </style>
</head>
<body>
    <div class="card">
        <div class="user-header">
            <b>ПІБ:</b> <span id="pib">Завантаження...</span> (<b>ФИО:</b> <span id="pib_ru">...</span>)<br>
            <b>Посада:</b> <span id="posada">...</span>
        </div>

        <label>🎯 МЕТА ВІДРЯДЖЕННЯ (ЦЕЛЬ):</label>
        <input type="text" id="purpose" placeholder="Введіть мету">

        <label>📍 МАРШРУТ:</label>
        <input type="text" id="destination" placeholder="Звідки - Куди">

        <div class="row">
            <div><label>📅 ВИЇЗД:</label><input type="date" id="date_start" onchange="calculate()"></div>
            <div><label>📅 ПРИБУТТЯ:</label><input type="date" id="date_end" onchange="calculate()"></div>
        </div>

        <label>🚗 АВТОМОБІЛЬ:</label>
        <select id="car" onchange="calculate()">
            <option value="6.5">Opel Combo (KA1197MO)</option>
            <option value="8.4">Toyota Corolla (KA4730AP)</option>
            <option value="6.5">Renault Duster (KA0144РК)</option>
        </select>

        <div class="row">
            <div><label>🗺️ ПЛАНОВИЙ КМ:</label><input type="number" id="km" value="0" oninput="calculate()"></div>
            <div><label>💰 ЦІНА ПАЛЬНОГО:</label><input type="number" id="price" value="0" oninput="calculate()"></div>
        </div>

        <div class="row">
            <div><label>🏨 ГОТЕЛЬ:</label><input type="number" id="hotel" value="0" oninput="calculate()"></div>
            <div><label>🍔 ДОБОВІ (1 ДОБА):</label><input type="number" id="per_diem" value="0" oninput="calculate()"></div>
        </div>

        <div class="total-box" id="total_display">РАЗОМ: 0 грн</div>
        
        <button class="btn-save" id="main_btn" onclick="validateForm()">💾 Зберегти план</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        const pib = urlParams.get('pib') || 'Користувач';
        document.getElementById('pib').innerText = pib;
        document.getElementById('pib_ru').innerText = pib;
        document.getElementById('posada').innerText = urlParams.get('pos') || 'Менеджер';

        function calculate() {
            const km = parseFloat(document.getElementById('km').value) || 0;
            const price = parseFloat(document.getElementById('price').value) || 0;
            const cons = parseFloat(document.getElementById('car').value) || 6.5;
            const hotel = parseFloat(document.getElementById('hotel').value) || 0;
            const perDiem = parseFloat(document.getElementById('per_diem').value) || 0;

            let days = 0;
            const s = document.getElementById('date_start').value;
            const e = document.getElementById('date_end').value;
            if (s && e) {
                const d1 = new Date(s), d2 = new Date(e);
                if (d2 >= d1) days = Math.ceil((d2 - d1) / (1000 * 60 * 60 * 24)) + 1;
            }

            let fuel = Math.round((km * cons / 100) * price);
            let total = fuel + hotel + (perDiem * days);
            document.getElementById('total_display').innerText = `РАЗОМ: ${total} грн`;
            return { total, fuel, days };
        }

        function validateForm() {
            const purp = document.getElementById('purpose');
            const dest = document.getElementById('destination');
            const km = document.getElementById('km');
            const price = document.getElementById('price');

            // Очищення стилів
            [purp, dest, km, price].forEach(el => el.classList.remove('invalid'));

            let errors = [];
            if (!purp.value.trim()) { purp.classList.add('invalid'); errors.push("Мету (Цель)"); }
            if (!dest.value.trim()) { dest.classList.add('invalid'); errors.push("Маршрут"); }
            if (parseFloat(km.value) <= 0) { km.classList.add('invalid'); errors.push("Кілометраж (КМ)"); }
            if (parseFloat(price.value) <= 0) { price.classList.add('invalid'); errors.push("Ціну пального (Цена)"); }

            if (errors.length > 0) {
                // Використовуємо нативний Popup Telegram, який не вішає форму
                tg.showPopup({
                    title: 'Увага! (Внимание!)',
                    message: 'Будь ласка, заповніть: ' + errors.join(", "),
                    buttons: [{type: 'ok', text: 'Зрозумів (Понял)'}]
                });
                tg.HapticFeedback.notificationOccurred('error');
                return;
            }

            // Якщо все добре — фінальне підтвердження
            tg.showPopup({
                title: 'Збереження',
                message: 'Все вірно? Відправити план?',
                buttons: [
                    {id: 'save', type: 'default', text: '✅ Так (Да)'},
                    {type: 'cancel', text: 'Скасувати'}
                ]
            }, (buttonId) => {
                if (buttonId === 'save') {
                    send();
                }
            });
        }

        function send() {
            const btn = document.getElementById('main_btn');
            btn.disabled = true;
            btn.innerText = "⏳...";

            const res = calculate();
            const data = {
                pib: document.getElementById('pib').innerText,
                purpose: document.getElementById('purpose').value,
                destination: document.getElementById('destination').value,
                total: res.total,
                km: document.getElementById('km').value,
                fuel_sum: res.fuel
            };

            tg.sendData(JSON.stringify(data));
            setTimeout(() => { tg.close(); }, 500);
        }
    </script>
</body>
</html>
