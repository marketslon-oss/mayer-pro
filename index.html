<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background-color: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border-radius: 10px; border: 1px solid #ccc; box-sizing: border-box; background: white; color: black; }
        label { display: block; margin-top: 10px; font-weight: bold; font-size: 13px; }
        .user-info { background: rgba(0,0,0,0.05); padding: 10px; border-radius: 10px; border-left: 4px solid #248b65; margin-bottom: 15px; }
        .total { background: #e8f5e9; padding: 15px; border-radius: 10px; text-align: center; margin-top: 15px; border: 1px solid #2e7d32; color: #2e7d32; font-weight: bold; }
        button { width: 100%; padding: 16px; background: #248b65; color: white; border: none; border-radius: 10px; margin-top: 20px; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>
    <div class="user-info" id="user_display">Завантаження...</div>

    <label>Мета відрядження:</label>
    <input type="text" id="purpose">

    <label>Маршрут (звідки-куди):</label>
    <input type="text" id="destination">

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div><label>Виїзд:</label><input type="date" id="date_start"></div>
        <div><label>Прибуття:</label><input type="date" id="date_end"></div>
    </div>

    <label>Автомобіль:</label>
    <select id="car" onchange="calc()">
        <option value="Opel Combo (KA1197MO)" data-cons="6.5">Opel (6.5л/100км)</option>
        <option value="Toyota Corolla (KA4730AP)" data-cons="8.4">Toyota (8.4л/100км)</option>
        <option value="Renault Duster (KA0144РК)" data-cons="6.5">Renault (6.5л/100км)</option>
    </select>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div><label>Пробіг, км:</label><input type="number" id="km" value="0" oninput="calc()"></div>
        <div><label>Ціна пального:</label><input type="number" id="price" value="52" oninput="calc()"></div>
    </div>

    <div class="total">РАЗОМ: <span id="res">0</span> грн</div>

    <button onclick="send()">💾 Зберегти план</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        let user = JSON.parse(decodeURIComponent(urlParams.get('user') || '{}'));
        if(user.pib) document.getElementById('user_display').innerHTML = `👤 <b>${user.pib}</b><br>💼 ${user.posada}`;

        function calc() {
            let km = parseFloat(document.getElementById('km').value) || 0;
            let pr = parseFloat(document.getElementById('price').value) || 0;
            let sel = document.getElementById('car');
            let cons = parseFloat(sel.options[sel.selectedIndex].dataset.cons);
            document.getElementById('res').innerText = Math.round((km * cons / 100) * pr);
        }

        function send() {
            let data = {
                purpose: document.getElementById('purpose').value,
                destination: document.getElementById('destination').value,
                date_start: document.getElementById('date_start').value,
                date_end: document.getElementById('date_end').value,
                car: document.getElementById('car').value,
                total: document.getElementById('res').innerText
            };
            tg.sendData(JSON.stringify(data));
            tg.close();
        }
    </script>
</body>
</html>
