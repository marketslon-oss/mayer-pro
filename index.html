<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>План Кошторис v1.3</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; padding: 10px; color: #333; margin: 0; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .user-info-box { background: #eef2f3; padding: 10px; border-radius: 8px; border-left: 4px solid #248b65; margin-bottom: 15px; font-size: 13px; }
        label { display: block; font-weight: bold; margin-top: 8px; font-size: 12px; color: #555; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; margin-top: 4px; box-sizing: border-box; font-size: 14px; }
        .readonly-input { background: #eee; color: #666; cursor: not-allowed; }
        .row { display: flex; gap: 8px; }
        .row > div { flex: 1; }
        .total { background: #e8f5e9; padding: 12px; border-radius: 8px; text-align: center; margin-top: 15px; border: 1px solid #2e7d32; color: #2e7d32; font-weight: bold; font-size: 20px; }
        button { width: 100%; padding: 16px; background: #4caf50; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; margin-top: 15px; cursor: pointer; transition: 0.3s; }
        button:active { background: #388e3c; transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="card">
        <div class="user-info-box">
            <label>👤 ПІБ:</label>
            <input type="text" id="user_name" class="readonly-input" readonly placeholder="Завантаження...">
            <div class="row">
                <div><label>💼 Посада:</label><input type="text" id="user_role" class="readonly-input" readonly></div>
                <div><label>🏢 Відділ:</label><input type="text" id="user_dept" class="readonly-input" readonly></div>
            </div>
        </div>

        <label>🎯 Мета відрядження:</label>
        <input type="text" id="purpose" placeholder="Наприклад: Ремонт техніки">

        <label>📍 Маршрут:</label>
        <input type="text" id="destination" placeholder="Кропивницький - Київ - Кропивницький">

        <div class="row">
            <div><label>📅 Виїзд:</label><input type="date" id="date_start" onchange="calculateDays()"></div>
            <div><label>📅 Прибуття:</label><input type="date" id="date_end" onchange="calculateDays()"></div>
        </div>

        <div class="row">
            <div><label>🔢 Кількість діб:</label><input type="number" id="days_count" value="1" class="readonly-input" readonly></div>
            <div>
                <label>🚗 Автомобіль:</label>
                <select id="car_select" onchange="calculateFuel()">
                    <option value="6.5">Opel Combo (6.5л)</option>
                    <option value="8.4">Toyota Corolla (8.4л)</option>
                    <option value="6.5">Renault Duster (6.5л)</option>
                </select>
            </div>
        </div>

        <div class="row">
            <div><label>🛣️ Плановий км:</label><input type="number" id="planned_km" placeholder="0" oninput="calculateFuel()"></div>
            <div>
