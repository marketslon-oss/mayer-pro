<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background-color: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); }
        label { display: block; margin-top: 10px; font-size: 13px; font-weight: bold; opacity: 0.8; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border-radius: 10px; border: 1px solid #ccc; box-sizing: border-box; font-size: 15px; background: white; color: black; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .user-card { background: rgba(0,0,0,0.05); padding: 12px; border-radius: 10px; margin-bottom: 15px; border-left: 4px solid #248b65; color: var(--tg-theme-text-color); }
        .total-box { background: #e8f5e9; padding: 15px; border-radius: 10px; margin-top: 15px; border: 1px solid #2e7d32; text-align: center; }
        .days-badge { background: #248b65; color: white; padding: 2px 8px; border-radius: 5px; font-size: 12px; margin-left: 5px; }
        button { width: 100%; padding: 16px; background: #248b65; color: white; border: none; border-radius: 10px; margin-top: 20px; font-weight: bold; font-size: 16px; cursor: pointer; }
        button:active { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="user-card">
        <div id="user_display">Завантаження...</div>
    </div>

    <div class="grid">
        <div><label>Дата виїзду:</label><input type="date" id="date_start" onchange="calculate()"></div>
        <div><label>Дата прибуття:</label><input type="date" id="date_end" onchange="calculate()"></div>
    </div>
