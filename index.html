<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Звіт Відрядження v3.9</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; padding: 10px; margin: 0; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .header { background: #e3f2fd; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 13px; border-left: 5px solid #2196f3; }
        label { display: block; font-weight: bold; margin-top: 10px; font-size: 11px; color: #555; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; margin-top: 4px; box-sizing: border-box; font-size: 14px; }
        .row { display: flex; gap: 10px; align-items: flex-start; }
        .row > div { flex: 1; }
        .total-box { background: #fff3e0; color: #e65100; border: 1px solid #ffb74d; padding: 12px; border-radius: 8px; text-align: center; margin-top: 15px; font-weight: bold; font-size: 18px; }
        .btn-save { width: 100%; padding: 15px; background: #2196f3; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <b>ЗВІТ ПОЇЗДКИ №:</b> <span id="trip_id">...</span><br>
            <b>Водій:</b> <span id="pib">...</span>
        </div>

        <label>📍 Фактичний маршрут:</label>
        <input type="text" id="dest" placeholder="Введіть маршрут">

        <div class="row">
            <div><label>🔢 Одометр СТАРТ:</label><input type="number" id="o_start" oninput="calculate()"></div>
            <div><label>🏁 Одометр ФІНІШ:</label><input type="number" id="o_end" oninput="calculate()"></div>
        </div>

        <div class="row">
            <div><label>⛽ Пальне (літри):</label><input type="number" id="f_liters" oninput="calculate()"></div>
            <div><label>💰 Пальне (сума):</label><input type="number" id="f_money" oninput="calculate()"></div>
        </div>

        <div class="row">
            <div><label>🏨 Готель (факт):</label><input type="number" id="hotel" oninput="calculate()"></div>
            <div><label>🍔 Добові (факт):</label><input type="number" id="per_diem" oninput="calculate()"></div>
        </div>

        <label>📝 Коментарі:</label>
        <textarea id="notes" rows="2"></textarea>

        <div class="total-box" id="total_display">ВСЬОГО ВИТРАТ: 0 грн</div>
        <button class="btn-save" id="main_btn" onclick="askBeforeSend()">💾 Надіслати та переглянути</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        const params = new URLSearchParams(window.location.search);
        document.getElementById('trip_id').innerText = params.get('trip_id') || '---';
        document.getElementById('pib').innerText = params.get('pib') || 'Користувач';
        document.getElementById('dest').value = params.get('dest') || '';
        document.getElementById('o_start').value = params.get('o_start') || '';

        function calculate() {
            const f_money = parseFloat(document.getElementById('f_money').value) || 0;
            const hotel = parseFloat(document.getElementById('hotel').value) || 0;
            const per_diem = parseFloat(document.getElementById('per_diem').value) || 0;
            const total = f_money + hotel + per_diem;
            document.getElementById('total_display').innerText = `ВСЬОГО ВИТРАТ: ${Math.round(total)} грн`;
            return total;
        }

        function askBeforeSend() {
            document.querySelectorAll('input').forEach(i => i.style.borderColor = '#ccc');

            const data = {
                dest: document.getElementById('dest').value.trim(),
                o_start: document.getElementById('o_start').value,
                o_end: document.getElementById('o_end').value,
                f_money: document.getElementById('f_money').value,
                per_diem: document.getElementById('per_diem').value
            };

            let missing = [];
            if (!data.dest) { missing.push("Маршрут"); document.getElementById('dest').style.borderColor = 'red'; }
            if (!data.o_start || !data.o_end) { missing.push("Одометр (Старт/Фініш)"); }
            if (!data.f_money || data.f_money <= 0) { missing.push("Сума за пальне"); document.getElementById('f_money').style.borderColor = 'red'; }
            if (!data.per_diem || data.per_diem <= 0) { missing.push("Добові"); document.getElementById('per_diem').style.borderColor = 'red'; }

            let message = "Надіслати звіт за поїздку №" + document.getElementById('trip_id').innerText + "?";
            if (missing.length > 0) {
                message = "⚠️ УВАГА! НЕ ЗАПОВНЕНО:\n• " + missing.join("\n• ") + "\n\nВсе одно надіслати?";
            }

            tg.showConfirm(message, function(ok) {
                if (ok) { sendData(); }
            });
        }

        function sendData() {
            const btn = document.getElementById('main_btn');
            btn.disabled = true;
            btn.innerText = "⏳ Формування звіту...";

            const sendObj = {
                type: 'report_update',
                trip_id: document.getElementById('trip_id').innerText,
                dest: document.getElementById('dest').value,
                o_start: document.getElementById('o_start').value,
                o_end: document.getElementById('o_end').value,
                f_liters: document.getElementById('f_liters').value || "0",
                f_money: document.getElementById('f_money').value || "0",
                hotel: document.getElementById('hotel').value || "0",
                per_diem: document.getElementById('per_diem').value || "0",
                notes: document.getElementById('notes').value || "",
                total: calculate().toString()
            };

            tg.sendData(JSON.stringify(sendObj));
            setTimeout(() => { tg.close(); }, 700);
        }

        calculate();
    </script>
</body>
</html>
