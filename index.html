<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>План відрядження</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; padding: 10px; color: #333; margin: 0; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .user-card { background: rgba(0,0,0,0.05); padding: 10px; border-radius: 8px; border-left: 4px solid #248b65; margin-bottom: 15px; font-size: 13px; }
        label { display: block; font-weight: bold; margin-top: 8px; font-size: 12px; color: #555; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; margin-top: 4px; box-sizing: border-box; font-size: 14px; }
        .row { display: flex; gap: 8px; }
        .row > div { flex: 1; }
        .total { background: #e8f5e9; padding: 12px; border-radius: 8px; text-align: center; margin-top: 15px; border: 1px solid #2e7d32; color: #2e7d32; font-weight: bold; font-size: 16px; }
        button { width: 100%; padding: 14px; background: #4caf50; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <div class="user-card">
            <div id="user-info">Завантаження даних...</div>
        </div>

        <label>🎯 Мета відрядження:</label>
        <input type="text" id="purpose" placeholder="Наприклад: Зустріч з клієнтом">

        <label>📍 Маршрут:</label>
        <input type="text" id="destination" placeholder="Київ - Львів - Київ">

        <div class="row">
            <div>
                <label>📅 Виїзд:</label>
                <input type="date" id="date_start" onchange="calculateDays()">
            </div>
            <div>
                <label>📅 Прибуття:</label>
                <input type="date" id="date_end" onchange="calculateDays()">
            </div>
        </div>

        <div class="row">
            <div>
                <label>🔢 Кількість діб:</label>
                <input type="number" id="days_count" value="1" readonly style="background: #eee;">
            </div>
            <div>
                <label>🛣️ Плановий км:</label>
                <input type="number" id="planned_km" value="0">
            </div>
        </div>

        <div class="row">
            <div>
                <label>⛽ ПММ (літри):</label>
                <input type="number" id="fuel_liters" value="0">
            </div>
            <div>
                <label>💸 ПММ (сума):</label>
                <input type="number" id="fuel_sum" value="0" oninput="calculateTotal()">
            </div>
        </div>

        <div class="row">
            <div>
                <label>🏨 Проживання:</label>
                <input type="number" id="hotel" value="0" oninput="calculateTotal()">
            </div>
            <div>
                <label>🍔 Добові (1 доба):</label>
                <input type="number" id="per_diem" value="0" oninput="calculateTotal()">
            </div>
        </div>

        <div class="total" id="total_display">РАЗОМ: 0 грн</div>
        <button onclick="sendData()">💾 Зберегти план</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Відображення даних водія з Telegram
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('user-info').innerHTML = `
                <b>👤 ${user.first_name} ${user.last_name || ''}</b><br>
                🆔 ID: ${user.id}
            `;
        }

        // Автоматичний розрахунок діб
        function calculateDays() {
            const start = new Date(document.getElementById('date_start').value);
            const end = new Date(document.getElementById('date_end').value);
            if (start && end && end >= start) {
                const diffTime = Math.abs(end - start);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;
                document.getElementById('days_count').value = diffDays;
                calculateTotal();
            }
        }

        // Розрахунок загальної суми
        function calculateTotal() {
            const fuel = parseFloat(document.getElementById('fuel_sum').value) || 0;
            const hotel = parseFloat(document.getElementById('hotel').value) || 0;
            const perDiem = parseFloat(document.getElementById('per_diem').value) || 0;
            const days = parseFloat(document.getElementById('days_count').value) || 0;
            
            const total = fuel + hotel + (perDiem * days);
            document.getElementById('total_display').innerText = `РАЗОМ: ${total} грн`;
            return total;
        }

        function sendData() {
            const data = {
                purpose: document.getElementById('purpose').value,
                destination: document.getElementById('destination').value,
                date_start: document.getElementById('date_start').value,
                date_end: document.getElementById('date_end').value,
                days_count: document.getElementById('days_count').value,
                planned_km: document.getElementById('planned_km').value,
                fuel_liters: document.getElementById('fuel_liters').value,
                fuel_sum: document.getElementById('fuel_sum').value,
                hotel: document.getElementById('hotel').value,
                per_diem: document.getElementById('per_diem').value,
                total: calculateTotal()
            };
            tg.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
