<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Звіт Mayer v7.2</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; padding: 10px; margin: 0; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .user-header { background: #f1f1f1; padding: 12px; border-radius: 10px; margin-bottom: 10px; font-size: 13px; border-left: 5px solid #71a95e; }
        .compact-dates { background: #fff9e6; padding: 8px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #ffeeba; display: flex; gap: 8px; justify-content: space-between; }
        .compact-dates > div { flex: 1; }
        .compact-dates label { margin-top: 0; font-size: 9px; font-weight: bold; text-transform: uppercase; }
        .compact-dates input { padding: 6px; font-size: 12px; text-align: center; border-radius: 5px; border: 1px solid #ccc; }
        label { display: block; font-weight: bold; margin-bottom: 4px; font-size: 10px; color: #555; text-transform: uppercase; line-height: 1.1; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .row { display: flex; gap: 10px; align-items: flex-end; margin-bottom: 12px; }
        .row > div { flex: 1; display: flex; flex-direction: column; }
        .car-box { text-align: center; background: #f9f9f9; padding: 8px; border-radius: 10px; border: 1px solid #eee; margin: 10px 0; }
        .gray-field { background: #f9f9f9; color: #444; border: 1px dashed #bbb; font-weight: bold; }
        .odo-section { background: #fdf2f2; padding: 10px; border-radius: 8px; border: 1px solid #f5c6cb; margin-bottom: 10px; }
        .fact-km { color: #d9534f; font-weight: bold; text-align: center; font-size: 12px; margin-top: 5px; }
        .btn-upload { background: #5d8aa8; padding: 10px; font-size: 11px; color: white; border: none; border-radius: 5px; width: 100%; cursor: pointer; font-weight: bold; }
        .finance-section { background: #f0f7ff; padding: 12px; border-radius: 10px; border: 1px solid #cce5ff; margin-top: 15px; }
        .total-box { background: #eef7ee; color: #2e7d32; border: 1px solid #2e7d32; padding: 12px; border-radius: 8px; text-align: center; margin-top: 10px; font-weight: bold; font-size: 18px; }
        .balance-box { font-size: 14px; margin-top: 5px; text-align: center; font-weight: bold; }
        .btn-save { width: 100%; padding: 15px; background: #71a95e; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; margin-top: 12px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <div class="user-header">
            <b>ПІБ:</b> <span id="pib">...</span><br>
            <b>Посада:</b> <span id="pos">...</span> | <b>Відділ:</b> <span id="vid">...</span>
        </div>

        <div class="compact-dates">
            <div><label>📅 ВИЇЗД</label><input type="text" id="date_start" class="gray-field" readonly></div>
            <div><label>📅 ПРИБУТТЯ</label><input type="text" id="date_end" class="gray-field" readonly></div>
            <div style="flex: 0.6;"><label>🔢 ДІБ</label><input type="text" id="days" class="gray-field" readonly></div>
        </div>

        <div class="car-box">
            <label style="margin-top:0;">🚗 СЛУЖБОВЕ АВТО</label>
            <input type="text" id="car" class="gray-field" readonly style="text-align: center; border: none; background: none; padding: 2px;">
        </div>

        <div class="odo-section">
            <div class="row" style="margin-bottom: 5px;">
                <div><label>📟 ОДО ВИЇЗД:</label><input type="number" id="odo_start" class="gray-field" readonly></div>
                <div><label>🏁 ОДО ПРИБУТТЯ:</label><input type="number" id="odo_finish" class="gray-field" readonly></div>
            </div>
            <div id="fact_km_display" class="fact-km">ПРОБІГ (ЖУРНАЛ): 0 КМ</div>
            <div style="margin-top: 8px;">
                <label>⛽ ВИТРАЧЕНО ПАЛИВА ПО ЧЕКАМ (Л):</label>
                <input type="number" id="fuel_liters_fact" class="gray-field" readonly style="color: #d9534f; text-align: center;">
            </div>
        </div>

        <div class="row">
            <div><label>⛽ ПАЛИВО СТАРТ:</label><input type="number" id="fuel_start" class="gray-field" readonly></div>
            <div><label>⛽ ПАЛИВО КІНЕЦЬ:</label><input type="number" id="fuel_end" class="gray-field" readonly></div>
        </div>

        <div class="row">
            <div><label>🏨 ПРОЖИВАННЯ:</label><input type="number" id="hotel" value="0" oninput="calculate()"></div>
            <div><label>🍔 ДОБОВІ:</label><input type="number" id="per_diem" value="0" oninput="calculate()"></div>
        </div>

        <div class="row">
            <div><label>🚌 ГРОМ. ТРАНСПОРТ:</label><input type="number" id="public_transport" value="0" oninput="calculate()"></div>
            <div><label>🛠️ ДОДАТКОВІ:</label><input type="number" id="extra_costs" value="0" oninput="calculate()"></div>
        </div>

        <div class="row">
            <div style="flex: 1.5;"><label>📝 ПРИМІТКА:</label><textarea id="comment" rows="1" placeholder="Деталі..."></textarea></div>
            <div><label>⛽ СУМА ЗАПРАВКИ (ГРН):</label><input type="number" id="fuel_money_journal" class="gray-field" readonly style="color: #2e7d32;"></div>
        </div>

        <div class="finance-section">
            <div class="row" style="margin-bottom: 0;">
                <div><label>💰 ОТРИМАНО:</label><input type="number" id="received" class="gray-field" readonly style="text-align: center;"></div>
                <div><label>💸 ФАКТИЧНО:</label><input type="number" id="actual_total" class="gray-field" readonly style="text-align: center;"></div>
            </div>
            <div id="balance_display" class="balance-box">ЗАЛИШОК: 0 грн</div>
        </div>

        <div class="total-box" id="total_display">РАЗОМ ВИТРАТИ: 0 грн</div>

        <div class="row" style="margin-top: 10px; margin-bottom: 5px;">
            <div><button type="button" class="btn-upload" onclick="document.getElementById('f1').click()">📁 ФАЙЛ</button><input type="file" id="f1" style="display:none" multiple onchange="updateStatus()"></div>
            <div><button type="button" class="btn-upload" onclick="document.getElementById('f2').click()">📷 ФОТО</button><input type="file" id="f2" accept="image/*" capture="camera" style="display:none" onchange="updateStatus()"></div>
        </div>
        <div id="file_status" style="font-size: 10px; text-align: center; color: #666;">Файли не вибрані</div>

        <button class="btn-save" onclick="sendData()">💾 Надіслати звіт</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        const params = new URLSearchParams(window.location.search);

        // Дані з trips_base
        document.getElementById('pib').innerText = params.get('pib') || '---';
        document.getElementById('pos').innerText = params.get('pos') || '---';
        document.getElementById('vid').innerText = params.get('vid') || '---';
        document.getElementById('car').value = params.get('car') || '';
        document.getElementById('date_start').value = params.get('start') || '';
        document.getElementById('date_end').value = params.get('end') || '';
        document.getElementById('days').value = params.get('days') || '1';
        
        const received = parseFloat(params.get('received')) || 0;
        document.getElementById('received').value = received;

        // Дані з Журналу (одометри, паливо, суми)
        const o_start = parseFloat(params.get('odo_start')) || 0;
        const o_end = parseFloat(params.get('odo_finish')) || 0;
        document.getElementById('odo_start').value = o_start;
        document.getElementById('odo_finish').value = o_end;
        document.getElementById('fact_km_display').innerText = `ПРОБІГ (ЖУРНАЛ): ${o_end - o_start} КМ`;

        document.getElementById('fuel_start').value = params.get('f_start') || '0';
        document.getElementById('fuel_end').value = params.get('f_end') || '0';
        document.getElementById('fuel_liters_fact').value = params.get('f_liters') || '0';
        
        const fuelMoneyJournal = parseFloat(params.get('f_money')) || 0;
        document.getElementById('fuel_money_journal').value = fuelMoneyJournal;

        function updateStatus() {
            const count = document.getElementById('f1').files.length + document.getElementById('f2').files.length;
            document.getElementById('file_status').innerText = count > 0 ? `✅ Додано документів: ${count}` : "Файли не вибрані";
        }

        function calculate() {
            const hotel = parseFloat(document.getElementById('hotel').value) || 0;
            const perDiem = parseFloat(document.getElementById('per_diem').value) || 0;
            const transport = parseFloat(document.getElementById('public_transport').value) || 0;
            const extra = parseFloat(document.getElementById('extra_costs').value) || 0;
            
            // СУМА ФАКТИЧНА = Проживання + Добові + Транспорт + Додаткові + Заправка з Журналу
            const total = hotel + perDiem + transport + extra + fuelMoneyJournal;
            const balance = received - total;

            document.getElementById('actual_total').value = total.toFixed(2);
            document.getElementById('total_display').innerText = `РАЗОМ ВИТРАТИ: ${total.toFixed(2)} грн`;
            
            const balanceEl = document.getElementById('balance_display');
            balanceEl.style.color = balance < 0 ? "#d9534f" : "#2e7d32";
            balanceEl.innerText = balance < 0 ? `ПЕРЕВИТРАТА: ${Math.abs(balance).toFixed(2)} грн` : `ЗАЛИШОК: ${balance.toFixed(2)} грн`;
            
            return { total, balance };
        }

        function sendData() {
            const res = calculate();
            const data = {
                form_type: 'report',
                trip_id: params.get('trip_id'),
                hotel: document.getElementById('hotel').value,
                per_diem: document.getElementById('per_diem').value,
                transport: document.getElementById('public_transport').value,
                extra: document.getElementById('extra_costs').value,
                comment: document.getElementById('comment').value,
                actual_total: res.total,
                balance: res.balance,
                fuel_journal_sum: fuelMoneyJournal
            };
            tg.sendData(JSON.stringify(data));
            tg.close();
        }
        calculate();
    </script>
</body>
</html>
