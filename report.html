<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Маршрутний лист v5.2</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; padding: 10px; margin: 0; }
        #loading_layer { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; position: fixed; top: 0; left: 0; width: 100%; background: #f4f4f4; z-index: 9999; }
        .loader_spin { width: 45px; height: 45px; border: 5px solid #ddd; border-top: 5px solid #71a95e; border-radius: 50%; animation: spin_f 0.8s linear infinite; margin-bottom: 15px; }
        @keyframes spin_f { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .report_card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: none; }
        
        /* Та сама шапка, що і у звіті */
        .user-header { background: #f1f1f1; padding: 10px; border-radius: 10px; margin-bottom: 15px; font-size: 12px; border-left: 5px solid #71a95e; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #f8f8f8; font-size: 10px; text-transform: uppercase; color: #666; }
        
        input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        
        .btn_add { background: #5d8aa8; color: white; border: none; padding: 10px 15px; border-radius: 8px; margin-top: 12px; cursor: pointer; font-weight: bold; font-size: 12px; }
        .btn_submit { width: 100%; padding: 15px; background: #71a95e; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; margin-top: 20px; cursor: pointer; }
        
        .total_box { background: #fffde7; border: 1px solid #fff59d; padding: 12px; border-radius: 8px; text-align: right; margin-top: 15px; font-weight: bold; font-size: 16px; color: #856404; }
        .remove-btn { color: #d9534f; cursor: pointer; font-weight: bold; text-align: center; font-size: 18px; }
    </style>
</head>
<body>
    <div id="loading_layer"><div class="loader_spin"></div><div style="color: #666;">Завантаження маршруту...</div></div>

    <div class="report_card" id="form_content">
        <div class="user-header">
            <b>ПІБ:</b> <span id="view_pib">...</span><br>
            <b>Посада:</b> <span id="view_pos">...</span> | <b>Відділ:</b> <span id="view_vid">...</span><br>
            <b>№ Поїздки:</b> <span id="view_trip" style="color:#d9534f; font-weight: bold;">...</span>
        </div>

        <div style="font-size: 11px; font-weight: bold; color: #555; margin-bottom: 5px;">📍 ДЕТАЛІЗАЦІЯ МАРШРУТУ</div>
        
        <table id="route_table">
            <thead>
                <tr>
                    <th>Звідки — Куди</th>
                    <th style="width: 80px;">КМ</th>
                    <th style="width: 30px;"></th>
                </tr>
            </thead>
            <tbody id="route_body">
                </tbody>
        </table>

        <button class="btn_add" onclick="addRow()">➕ ДОДАТИ ТОЧКУ</button>

        <div class="total_box">
            ЗАГАЛЬНИЙ ПРОБІГ: <span id="total_km">0</span> км
        </div>

        <button class="btn_submit" onclick="askBeforeSend()">💾 ЗБЕРЕГТИ МАРШРУТ</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        const p = new URLSearchParams(window.location.search);

        window.onload = () => {
            // Заповнюємо шапку з параметрів URL
            document.getElementById('view_pib').innerText = p.get('pib') || '---';
            document.getElementById('view_pos').innerText = p.get('posada') || '---';
            document.getElementById('view_vid').innerText = p.get('viddil') || '---';
            document.getElementById('view_trip').innerText = p.get('trip_id') || '---';

            // Додаємо перший рядок автоматично
            addRow();

            document.getElementById('loading_layer').style.display = 'none';
            document.getElementById('form_content').style.display = 'block';
        };

        function addRow() {
            const tbody = document.getElementById('route_body');
            const row = tbody.insertRow();
            row.innerHTML = `
                <td><input type="text" class="in-path" placeholder="напр. Київ - Обухів"></td>
                <td><input type="number" class="in-km" placeholder="0" oninput="calculateTotal()"></td>
                <td class="remove-btn" onclick="removeRow(this)">×</td>
            `;
        }

        function removeRow(btn) {
            const row = btn.parentNode.parentNode;
            if (document.querySelectorAll('#route_body tr').length > 1) {
                row.remove();
                calculateTotal();
            }
        }

        function calculateTotal() {
            let total = 0;
            document.querySelectorAll('.in-km').forEach(el => {
                total += parseFloat(el.value) || 0;
            });
            document.getElementById('total_km').innerText = total.toFixed(0);
            return total;
        }

        function askBeforeSend() {
            const total = calculateTotal();
            const tripId = document.getElementById('view_trip').innerText;
            const rows = document.querySelectorAll('#route_body tr');
            
            let routeSummary = "";
            let dataList = [];
            let isError = false;

            rows.forEach((row, i) => {
                const path = row.querySelector('.in-path').value;
                const km = row.querySelector('.in-km').value;
                
                if (!path || !km) {
                    isError = true;
                    row.querySelector('.in-path').style.borderColor = 'red';
                }
                
                routeSummary += `${i+1}. ${path} — ${km} км\n`;
                dataList.push(`${path} (${km} км)`);
            });

            if (isError) {
                tg.showAlert("⚠️ Заповніть усі поля маршруту!");
                return;
            }

            let confirmMsg = `📋 ПЕРЕВІРКА МАРШРУТУ №${tripId}\n` +
                             `──────────────────\n` +
                             routeSummary +
                             `──────────────────\n` +
                             `🏁 РАЗОМ: ${total} км\n\n` +
                             `Зберегти дані?`;

            tg.showConfirm(confirmMsg, (ok) => {
                if (ok) {
                    tg.sendData(JSON.stringify({
                        type: "route_list_save",
                        trip_id: p.get('trip_id'),
                        route_details: dataList.join(" | "),
                        total_km: total.toString()
                    }));
                    tg.close();
                }
            });
        }
    </script>
</body>
</html>
