<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Звіт Mayer v5.7</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; padding: 10px; margin: 0; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .user-header { background: #f1f1f1; padding: 12px; border-radius: 10px; margin-bottom: 10px; font-size: 13px; border-left: 5px solid #71a95e; }
        
        .compact-dates { background: #fff9e6; padding: 8px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #ffeeba; display: flex; gap: 8px; justify-content: space-between; }
        .compact-dates > div { flex: 1; }
        .compact-dates label { margin-top: 0; font-size: 9px; font-weight: bold; text-transform: uppercase; }
        .compact-dates input { padding: 6px; font-size: 12px; text-align: center; border-radius: 5px; border: 1px solid #ccc; }

        label { display: block; font-weight: bold; margin-bottom: 4px; font-size: 10px; color: #555; text-transform: uppercase; line-height: 1.1; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        
        .row { display: flex; gap: 10px; align-items: flex-end; margin-bottom: 12px; }
        .row > div { flex: 1; display: flex; flex-direction: column; }
        
        .car-box { text-align: center; background: #f9f9f9; padding: 8px; border-radius: 10px; border: 1px solid #eee; margin: 10px 0; }
        .gray-field { background: #f9f9f9; color: #444; border: 1px dashed #bbb; font-weight: bold; }
        
        .odo-section { background: #fdf2f2; padding: 10px; border-radius: 8px; border: 1px solid #f5c6cb; margin-bottom: 10px; }
        .fact-km { color: #d9534f; font-weight: bold; text-align: center; font-size: 13px; margin-top: 8px; }

        /* Компактні кнопки завантаження як у Плані */
        .btn-upload { background: #5d8aa8; padding: 10px; font-size: 12px; margin-top: 5px; color: white; border: none; border-radius: 5px; width: 100%; cursor: pointer; font-weight: bold; }
        .file-status { font-size: 10px; color: #666; margin-top: 4px; text-align: center; }

        .finance-section { background: #f0f7ff; padding: 12px; border-radius: 10px; border: 1px solid #cce5ff; margin-top: 15px; }
        .total-box { background: #eef7ee; color: #2e7d32; border: 1px solid #2e7d32; padding: 12px; border-radius: 8px; text-align: center; margin-top: 10px; font-weight: bold; font-size: 18px; }
        .balance-box { font-size: 14px; margin-top: 5px; text-align: center; font-weight: bold; }

        .btn-save { width: 100%; padding: 15px; background: #71a95e; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <div class="user-header">
            <b>ПІБ:</b> <span id="pib">...</span><br>
            <b>Посада:</b> <span id="pos">...</span><br>
            <b>Відділ:</b> <span id="vid">...</span>
        </div>

        <div class="compact-dates">
            <div><label>📅 ВИЇЗД</label><input type="text" id="date_start" class="gray-field" readonly></div>
            <div><label>📅 ПРИБУТТЯ</label><input type="text" id="date_end" class="gray-field" readonly></div>
            <div style="flex: 0.6;"><label>🔢 ДІБ</label><input type="text" id="days" class="gray-field" readonly></div>
        </div>

        <div class="car-box">
            <label style="margin-top:0;">🚗 СЛУЖБОВЕ АВТО</label>
            <input type="text" id="car" class="gray-field" readonly style="text-align: center; border: none; background: none; padding: 2px;">
        </div>

        <label>🎯 МЕТА ВІДРЯДЖЕННЯ:</label>
        <input type="text" id="purpose" class="gray-field" readonly style="margin-bottom: 10px;">

        <label>📍 МАРШРУТ (ПЛАН):</label>
        <input type="text" id="destination" class="gray-field" readonly style="margin-bottom: 10px;">

        <div class="odo-section">
            <div class="row" style="margin-bottom: 0;">
                <div><label>📟 ОДОМЕТР ВИЇЗД:</label><input type="number" id="odo_start" class="gray-field" readonly></div>
                <div><label>🏁 ОДОМЕТР ПРИБУТТЯ:</label><input type="number" id="odo_finish" placeholder="0" oninput="calculate()"></div>
            </div>
            <div id="fact_km_display" class="fact-km">ФАКТИЧНИЙ ПРОБІГ: 0 КМ</div>
        </div>

        <div class="row">
            <div><label>⛽ ПАЛИВО ВИЇЗД (Л):</label><input type="number" id="fuel_start" value="0" oninput="calculate()"></div>
            <div><label>⛽ ПАЛИВО ПРИБУТТЯ (Л):</label><input type="number" id="fuel_end" value="0" oninput="calculate()"></div>
        </div>

        <div class="row">
            <div><label>🏨 ПРОЖИВАННЯ (ГРН):</label><input type="number" id="hotel" value="0" oninput="calculate()"></div>
            <div><label>🍔 ДОБОВІ ВИТРАТИ (ГРН):</label><input type="number" id="per_diem" value="0" oninput="calculate()"></div>
        </div>

        <div class="row">
            <div><label>🚌 ГРОМАДСЬКИЙ ТРАНСПОРТ:</label><input type="number" id="public_transport" value="0" oninput="calculate()"></div>
            <div><label>🛠️ ДОДАТКОВІ ВИТРАТИ:</label><input type="number" id="extra_costs" value="0" oninput="calculate()"></div>
        </div>
        
        <label>📝 ПРИМІТКА ДО ВИТРАТ:</label>
        <textarea id="comment" rows="2" placeholder="Деталі витрат..."></textarea>

        <label>📎 ДОДАТИ ДОКУМЕНТИ (ЧЕКИ, ОДО):</label>
        <div class="row">
            <div>
                <button type="button" class="btn-upload" onclick="document.getElementById('f1').click()">📁 ФАЙЛ</button>
                <input type="file" id="f1" style="display:none" multiple onchange="updateStatus()">
            </div>
            <div>
                <button type="button" class="btn-upload" onclick="document.getElementById('f2').click()">📷 ФОТО</button>
                <input type="file" id="f2" accept="image/*" capture="camera" style="display:none" onchange="updateStatus()">
            </div>
        </div>
        <div id="file_status" class="file-status">Файли не вибрані</div>

        <div class="finance-section">
            <div class="row" style="margin-bottom: 0;">
                <div><label>💰 ОТРИМАНО:</label><input type="number" id="received" class="gray-field" readonly style="text-align: center;"></div>
                <div><label>💸 ФАКТИЧНО:</label><input type="number" id="actual_total" class="gray-field" readonly style="text-align: center;"></div>
            </div>
            <div id="balance_display" class="balance-box">ЗАЛИШОК: 0 грн</div>
        </div>

        <div class="total-box" id="total_display">РАЗОМ ВИТРАТИ: 0 грн</div>
        <button class="btn-save" onclick="sendData()">💾 Надіслати звіт</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        const params = new URLSearchParams(window.location.search);

        document.getElementById('pib').innerText = params.get('pib') || '---';
        document.getElementById('pos').innerText = params.get('pos') || '---';
        document.getElementById('vid').innerText = params.get('vid') || '---';
        
        const received = parseFloat(params.get('received')) || 0;
        document.getElementById('received').value = received;
        
        document.getElementById('purpose').value = params.get('purpose') || '';
        document.getElementById('destination').value = params.get('dest') || '';
        document.getElementById('date_start').value = params.get('start') || '';
        document.getElementById('date_end').value = params.get('end') || '';
        document.getElementById('days').value = params.get('days') || '0';
        document.getElementById('car').value = params.get('car') || '';
        document.getElementById('odo_start').value = params.get('odo_start') || '0';

        function updateStatus() {
            const f1 = document.getElementById('f1').files.length;
            const f2 = document.getElementById('f2').files.length;
            const status = document.getElementById('file_status');
            if (f1 + f2 > 0) {
                status.innerText = `✅ Додано файлів: ${f1 + f2}`;
                status.style.color = "#2e7d32";
            } else {
                status.innerText = "Файли не вибрані";
                status.style.color = "#666";
            }
        }

        function calculate() {
            const startKm = parseFloat(document.getElementById('odo_start').value) || 0;
            const endKm = parseFloat(document.getElementById('odo_finish').value) || 0;
            const factKm = (endKm > startKm) ? (endKm - startKm) : 0;
            document.getElementById('fact_km_display').innerText = `ФАКТИЧНИЙ ПРОБІГ: ${factKm} КМ`;

            const hotel = parseFloat(document.getElementById('hotel').value) || 0;
            const perDiem = parseFloat(document.getElementById('per_diem').value) || 0;
            const transport = parseFloat(document.getElementById('public_transport').value) || 0;
            const extra = parseFloat(document.getElementById('extra_costs').value) || 0;
            
            const total = hotel + perDiem + transport + extra;
            const balance = received - total;

            document.getElementById('actual_total').value = total;
            document.getElementById('total_display').innerText = `РАЗОМ ВИТРАТИ: ${total} грн`;
            
            const balanceEl = document.getElementById('balance_display');
            if (balance < 0) {
                balanceEl.style.color = "#d9534f";
                balanceEl.innerText = `ПЕРЕВИТРАТА: ${Math.abs(balance)} грн`;
            } else {
                balanceEl.style.color = "#2e7d32";
                balanceEl.innerText = `ЗАЛИШОК: ${balance} грн`;
            }
            return { total, balance, factKm };
        }

        function sendData() {
            const res = calculate();
            const data = {
                form_type: 'report',
                trip_id: params.get('trip_id'),
                odo_finish: document.getElementById('odo_finish').value,
                fact_km: res.factKm,
                fuel_start: document.getElementById('fuel_start').value,
                fuel_end: document.getElementById('fuel_end').value,
                hotel: document.getElementById('hotel').value,
                per_diem: document.getElementById('per_diem').value,
                public_transport: document.getElementById('public_transport').value,
                extra: document.getElementById('extra_costs').value,
                comment: document.getElementById('comment').value,
                received: received,
                actual_total: res.total,
                balance: res.balance
            };
            tg.sendData(JSON.stringify(data));
            tg.close();
        }

        calculate();
    </script>
</body>
</html>
