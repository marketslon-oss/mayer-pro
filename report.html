<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Звіт Mayer v9.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; padding: 10px; margin: 0; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .user-header { background: #f1f1f1; padding: 12px; border-radius: 10px; margin-bottom: 10px; font-size: 13px; border-left: 5px solid #71a95e; }
        .row { display: flex; gap: 10px; align-items: flex-end; margin-bottom: 10px; }
        .row > div { flex: 1; display: flex; flex-direction: column; }
        label { display: block; font-weight: bold; font-size: 9px; color: #555; text-transform: uppercase; margin-bottom: 4px; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .gray { background: #f9f9f9; color: #444; font-weight: bold; border: 1px dashed #bbb; }
        .odo-box { background: #fdf2f2; padding: 10px; border-radius: 8px; border: 1px solid #f5c6cb; margin-bottom: 10px; }
        .btn-up { background: #5d8aa8; color: white; border: none; padding: 10px; border-radius: 5px; font-size: 11px; font-weight: bold; width: 100%; cursor: pointer; }
        .total-box { background: #eef7ee; color: #2e7d32; border: 1px solid #2e7d32; padding: 12px; border-radius: 8px; text-align: center; margin-top: 10px; font-weight: bold; font-size: 18px; }
        .btn-save { width: 100%; padding: 15px; background: #71a95e; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="user-header">
            <b>ПІБ:</b> <span id="pib">...</span><br>
            <b>Посада:</b> <span id="pos">...</span> | <b>Відділ:</b> <span id="vid">...</span>
        </div>

        <div class="row">
            <div><label>📅 ВИЇЗД</label><input type="text" id="start" class="gray" readonly></div>
            <div><label>📅 ПРИБУТТЯ</label><input type="text" id="end" class="gray" readonly></div>
            <div style="flex:0.5;"><label>🔢 ДІБ</label><input type="text" id="days" class="gray" readonly></div>
        </div>

        <div class="odo-box">
            <div class="row" style="margin-bottom:5px;">
                <div><label>📟 ОДО ВИЇЗД</label><input type="number" id="o_start" class="gray" readonly></div>
                <div><label>🏁 ОДО ПРИБУТТЯ</label><input type="number" id="o_end" class="gray" readonly></div>
            </div>
            <div style="text-align:center; font-size:11px; font-weight:bold; color:#d9534f;">
                ПРОБІГ ЗА ЖУРНАЛОМ: <span id="km_txt"></span> КМ | ⛽ ПАЛИВО: <span id="fl_txt"></span> Л
            </div>
        </div>

        <div class="row">
            <div><label>🏨 ПРОЖИВАННЯ</label><input type="number" id="hotel" placeholder="" oninput="calc()"></div>
            <div><label>🍔 ДОБОВІ</label><input type="number" id="diem" placeholder="" oninput="calc()"></div>
        </div>

        <div class="row">
            <div><label>🚌 ТРАНСПОРТ</label><input type="number" id="trans" placeholder="" oninput="calc()"></div>
            <div><label>🛠️ ДОДАТКОВІ</label><input type="number" id="extra" placeholder="" oninput="calc()"></div>
        </div>

        <div class="row">
            <div style="flex:1.5;"><label>📝 ПРИМІТКА</label><input type="text" id="comm" placeholder="Кропивницький-Київ-Кропивницький"></div>
            <div><label>⛽ ЗАПРАВКА (ГРН)</label><input type="number" id="f_money" class="gray" readonly></div>
        </div>

        <div class="row">
            <div><label>💰 ОТРИМАНО</label><input type="number" id="received" class="gray" readonly style="text-align: center;"></div>
            <div id="bal_container" style="text-align: center;">
                <label>⚖️ ЗАЛИШОК / ПЕРЕВИТРАТА</label>
                <div id="bal_txt" style="font-weight: bold; font-size: 14px; padding-top: 8px;"></div>
            </div>
        </div>

        <div class="total-box" id="total_display">РАЗОМ ВИТРАТИ: 0 грн</div>

        <div class="row" style="margin-top:15px;">
            <div><button class="btn-up" onclick="document.getElementById('f1').click()">📁 ФАЙЛ</button><input type="file" id="f1" style="display:none"></div>
            <div><button class="btn-up" onclick="document.getElementById('f2').click()">📷 ФОТО</button><input type="file" id="f2" accept="image/*" capture="camera" style="display:none"></div>
        </div>

        <button class="btn-save" onclick="send()">💾 Надіслати звіт</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        const p = new URLSearchParams(window.location.search);

        // Функція для перевірки на 0 або порожньо
        function clean(val) {
            return (val && val !== "0" && val !== "null") ? val : "";
        }

        // Наповнення даними
        document.getElementById('pib').innerText = p.get('pib') || '---';
        document.getElementById('pos').innerText = p.get('posada') || '---';
        document.getElementById('vid').innerText = p.get('viddil') || '---';
        document.getElementById('start').value = p.get('start') || '';
        document.getElementById('end').value = p.get('end') || '';
        
        // Прибираємо "1" у діб, якщо немає даних
        let d = p.get('days');
        document.getElementById('days').value = (d && d !== "1" && d !== "0") ? d : "";

        document.getElementById('received').value = clean(p.get('money_received'));

        const os = parseFloat(p.get('o_start')) || 0;
        const oe = parseFloat(p.get('o_end')) || 0;
        document.getElementById('o_start').value = clean(p.get('o_start'));
        document.getElementById('o_end').value = clean(p.get('o_end'));
        
        let km = oe - os;
        document.getElementById('km_txt').innerText = km > 0 ? km.toFixed(0) : "";
        
        let fl = p.get('f_liters');
        document.getElementById('fl_txt').innerText = clean(fl);
        document.getElementById('f_money').value = clean(p.get('f_money'));

        function calc() {
            const h = parseFloat(document.getElementById('hotel').value) || 0;
            const d = parseFloat(document.getElementById('diem').value) || 0;
            const t = parseFloat(document.getElementById('trans').value) || 0;
            const e = parseFloat(document.getElementById('extra').value) || 0;
            const fm = parseFloat(document.getElementById('f_money').value) || 0;
            const rec = parseFloat(document.getElementById('received').value) || 0;

            const total = h + d + t + e + fm;
            const bal = rec - total;

            document.getElementById('total_display').innerText = `РАЗОМ ВИТРАТИ: ${total.toFixed(0)} грн`;
            const bEl = document.getElementById('bal_txt');
            
            if (total === 0 && rec === 0) {
                bEl.innerText = "";
            } else {
                bEl.style.color = bal < 0 ? "#d9534f" : "#2e7d32";
                bEl.innerText = bal < 0 ? `ПЕРЕВИТРАТА: ${Math.abs(bal).toFixed(0)} грн` : `${bal.toFixed(0)} грн`;
            }
        }

        function send() {
            const result = {
                trip_id: p.get('trip_id'),
                total_spent: document.getElementById('total_display').innerText,
                comment: document.getElementById('comm').value
            };
            tg.sendData(JSON.stringify(result));
            tg.close();
        }
        calc();
    </script>
</body>
</html>
