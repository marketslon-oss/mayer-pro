<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mayer Report v11.5</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; padding: 10px; margin: 0; }
        #loading_layer { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; position: fixed; top: 0; left: 0; width: 100%; background: #f4f4f4; z-index: 9999; }
        .loader_spin { width: 45px; height: 45px; border: 5px solid #ddd; border-top: 5px solid #71a95e; border-radius: 50%; animation: spin_f 0.8s linear infinite; margin-bottom: 15px; }
        @keyframes spin_f { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .report_card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: none; }
        
        /* ВІДНОВЛЕНА СТРУКТУРА ЗАГОЛОВКА */
        .user-header { background: #f1f1f1; padding: 10px; border-radius: 10px; margin-bottom: 10px; font-size: 12px; border-left: 5px solid #71a95e; }
        
        .row { display: flex; gap: 8px; align-items: flex-end; margin-bottom: 10px; }
        .row > div { flex: 1; display: flex; flex-direction: column; }
        label { display: block; font-weight: bold; font-size: 9px; color: #555; text-transform: uppercase; margin-bottom: 4px; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .gray_box { background: #f9f9f9; color: #444; font-weight: bold; border: 1px dashed #bbb; }
        
        .section_frame { padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #ddd; }
        .odo_bg { background: #fdf2f2; border-color: #f5c6cb; }
        .fuel_bg { background: #fffde7; border-color: #fff59d; }

        .balance_container { background: #eef7ee; padding: 12px; border-radius: 10px; border: 1px solid #c3e6cb; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .bal_part { flex: 1; text-align: center; }
        .bal_divider { width: 1px; height: 35px; background: #c3e6cb; margin: 0 5px; }
        .bal_val { font-size: 18px; font-weight: bold; margin-top: 2px; }
        .total_summary { background: #eef7ee; color: #2e7d32; border: 1px solid #2e7d32; padding: 12px; border-radius: 8px; text-align: center; margin-top: 10px; font-weight: bold; font-size: 18px; }
        
        .btn_up { background: #5d8aa8; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 11px; font-weight: bold; width: 100%; cursor: pointer; text-align: center; }
        .btn_submit { width: 100%; padding: 15px; background: #71a95e; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>
    <div id="loading_layer"><div class="loader_spin"></div><div style="color: #666;">Завантаження...</div></div>

    <div class="report_card" id="form_content">
        <div class="user-header">
            <b>ПІБ:</b> <span id="view_pib">...</span><br>
            <b>Посада:</b> <span id="view_pos">...</span> | <b>Відділ:</b> <span id="view_vid">...</span><br>
            <b>№ Поїздки:</b> <span id="view_trip" style="color:#d9534f; font-weight: bold;">...</span>
        </div>

        <div class="row"><div><label>🎯 МЕТА</label><input type="text" id="in_purpose" class="gray_box" readonly></div></div>
        <div class="row"><div><label>📍 МАРШРУТ</label><input type="text" id="in_dest" class="gray_box" readonly></div></div>

        <div class="row">
            <div><label>📅 ВИЇЗД</label><input type="text" id="in_start" class="gray_box" readonly></div>
            <div><label>📅 ПРИБУТТЯ</label><input type="text" id="in_end" class="gray_box" readonly></div>
            <div style="flex:0.4;"><label>🔢 ДІБ</label><input type="text" id="in_days" class="gray_box" readonly></div>
        </div>

        <div class="section_frame odo_bg">
            <div class="row">
                <div><label>📟 ОДОМЕТР ВИЇЗД</label><input type="text" id="in_os" class="gray_box" readonly></div>
                <div><label>🏁 ОДОМЕТР ПРИБУТТЯ</label><input type="text" id="in_oe" class="gray_box" readonly></div>
            </div>
            <div class="row" style="margin-top:5px;">
                <div><label>🗺️ ПЛАН КМ</label><input type="text" id="in_plan_km" class="gray_box" readonly></div>
                <div><label>📏 ФАКТ КМ</label><input type="text" id="in_fact_km" class="gray_box" readonly style="color: #d9534f;"></div>
            </div>
        </div>

        <div class="section_frame fuel_bg">
            <div class="row">
                <div><label>⛽ ЗАЛИШОК ВИЇЗД</label><input type="number" id="fuel_start" placeholder="0"></div>
                <div><label>⛽ ЗАЛИШОК ПРИБУТТЯ</label><input type="number" id="fuel_end" placeholder="0"></div>
            </div>
            <div class="row" style="margin-top:5px;">
                <div><label>⛽ ПЛАН ПАЛИВА (Л)</label><input type="text" id="in_plan_fuel" class="gray_box" readonly></div>
                <div><label>⛽ ЗАПРАВЛЕНО (ФАКТ)</label><input type="text" id="in_fact_fuel" class="gray_box" readonly style="color: #d9534f;"></div>
            </div>
        </div>

        <div class="row">
            <div><label>🏨 ПРОЖИВАННЯ</label><input type="number" id="in_hotel" oninput="doCalc()"></div>
            <div><label>🍔 ДОБОВІ</label><input type="number" id="in_diem" oninput="doCalc()"></div>
        </div>
        <div class="row">
            <div><label>🚌 ТРАНСПОРТ (ГРОМ.)</label><input type="number" id="in_trans" placeholder="Введіть суму" oninput="doCalc()"></div>
            <div><label>🛠️ ДОДАТКОВІ ВИТРАТИ</label><input type="number" id="in_extra" placeholder="Введіть суму" oninput="doCalc()"></div>
        </div>

        <div style="margin-bottom:10px;"><label>📝 ПРИМІТКА</label><input type="text" id="in_comm" placeholder="Опишіть витрати..."></div>

        <div class="balance_container">
            <div class="bal_part"><label>💰 ОТРИМАНО</label><div id="val_rec" class="bal_val">0</div></div>
            <div class="bal_divider" style="width:1px;height:35px;background:#c3e6cb;"></div>
            <div class="bal_part"><label>⚖️ ЗАЛИШОК</label><div id="val_bal" class="bal_val">0</div></div>
        </div>

        <div class="total_summary" id="total_out">РАЗОМ ВИТРАТИ: 0 грн</div>

        <div class="row" style="margin-top:15px;">
            <div><button type="button" class="btn_up" onclick="document.getElementById('f_doc').click()">📁 ФАЙЛ</button><input type="file" id="f_doc" style="display:none"></div>
            <div><button type="button" class="btn_up" onclick="document.getElementById('f_img').click()">📷 ФОТО</button><input type="file" id="f_img" accept="image/*" capture="camera" style="display:none"></div>
        </div>
        <button class="btn_submit" onclick="sendReport()">💾 Надіслати звіт</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        const p = new URLSearchParams(window.location.search);
        function fix(v) { return (!v || v === "0" || v === "null") ? "" : v; }

        window.onload = () => {
            // ВІДНОВЛЕНЕ ЗАПОВНЕННЯ ШАПКИ
            document.getElementById('view_pib').innerText = p.get('pib') || '---';
            document.getElementById('view_pos').innerText = p.get('posada') || '---';
            document.getElementById('view_vid').innerText = p.get('viddil') || '---';
            document.getElementById('view_trip').innerText = p.get('trip_id') || '---';
            
            document.getElementById('in_purpose').value = p.get('purpose') || '';
            document.getElementById('in_dest').value = p.get('dest') || '';
            document.getElementById('in_start').value = p.get('start') || '';
            document.getElementById('in_end').value = p.get('end') || '';
            document.getElementById('in_days').value = fix(p.get('days'));
            document.getElementById('in_plan_km').value = fix(p.get('plan_km'));
            document.getElementById('in_plan_fuel').value = fix(p.get('plan_fuel'));
            
            document.getElementById('in_hotel').value = fix(p.get('plan_hotel'));
            document.getElementById('in_diem').value = fix(p.get('plan_diem'));
            
            document.getElementById('in_os').value = fix(p.get('o_start'));
            document.getElementById('in_oe').value = fix(p.get('o_end'));
            let km = (parseFloat(p.get('o_end')) || 0) - (parseFloat(p.get('o_start')) || 0);
            document.getElementById('in_fact_km').value = km > 0 ? km.toFixed(0) : "0";
            document.getElementById('in_fact_fuel').value = fix(p.get('f_liters')) || "0";
            document.getElementById('val_rec').innerText = p.get('money_received') || "0";
            
            doCalc();
            document.getElementById('loading_layer').style.display = 'none';
            document.getElementById('form_content').style.display = 'block';
        };

        function doCalc() {
            const h = parseFloat(document.getElementById('in_hotel').value) || 0;
            const d = parseFloat(document.getElementById('in_diem').value) || 0;
            const t = parseFloat(document.getElementById('in_trans').value) || 0;
            const e = parseFloat(document.getElementById('in_extra').value) || 0;
            const r = parseFloat(document.getElementById('val_rec').innerText) || 0;
            const spent = h + d + t + e;
            document.getElementById('total_out').innerText = `РАЗОМ ВИТРАТИ: ${spent.toFixed(0)} грн`;
            const bal = r - spent;
            const bEl = document.getElementById('val_bal');
            bEl.innerText = bal.toFixed(0);
            bEl.style.color = bal < 0 ? "#d9534f" : "#2e7d32";
        }

        function sendReport() {
            tg.sendData(JSON.stringify({
                type: "report_update",
                trip_id: p.get('trip_id'),
                hotel: document.getElementById('in_hotel').value || "0",
                diem: document.getElementById('in_diem').value || "0",
                trans: document.getElementById('in_trans').value || "0",
                extra: document.getElementById('in_extra').value || "0",
                fuel_start: document.getElementById('fuel_start').value || "0",
                fuel_end: document.getElementById('fuel_end').value || "0",
                comment: document.getElementById('in_comm').value || "",
                total: document.getElementById('total_out').innerText.replace(/\D/g, '')
            }));
            tg.close();
        }
    </script>
</body>
</html>
