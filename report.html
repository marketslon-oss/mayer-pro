<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Звіт про відрядження</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; padding: 10px; color: #333; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        h3 { margin-top: 0; color: #007aff; border-bottom: 1px solid #eee; padding-bottom: 8px; font-size: 16px; }
        label { display: block; font-size: 11px; color: #666; margin-bottom: 4px; margin-top: 10px; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; background: #f9f9f9; font-size: 14px; color: #555; }
        .row { display: flex; gap: 10px; }
        .col { flex: 1; }
    </style>
</head>
<body>

    <div class="card">
        <h3>👤 Дані співробітника</h3>
        <label>ПІБ Співробітника</label>
        <input type="text" id="pib" readonly>
        
        <label>Посада</label>
        <input type="text" id="posada" readonly>
    </div>

    <div class="card">
        <h3>📅 Деталі відрядження</h3>
        <div class="row">
            <div class="col">
                <label>Дата вибуття</label>
                <input type="text" id="start" readonly>
            </div>
            <div class="col">
                <label>Дата прибуття</label>
                <input type="text" id="end" readonly>
            </div>
        </div>
        
        <label>Кількість діб</label>
        <input type="text" id="days" readonly>
        
        <label>Мета відрядження</label>
        <input type="text" id="purpose" readonly>
        
        <label>Маршрут</label>
        <input type="text" id="dest" readonly>

        <label>Службове авто</label>
        <input type="text" id="car" readonly>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const params = new URLSearchParams(window.location.search);
        
        // Заповнення полів з URL
        document.getElementById('pib').value = params.get('pib') || "—";
        document.getElementById('posada').value = params.get('posada') || "—";
        document.getElementById('start').value = params.get('start') || "—";
        document.getElementById('end').value = params.get('end') || "—";
        document.getElementById('days').value = params.get('days') || "0";
        document.getElementById('purpose').value = params.get('purpose') || "—";
        document.getElementById('dest').value = params.get('dest') || "—";
        document.getElementById('car').value = params.get('car') || "—";
    </script>
</body>
</html>
