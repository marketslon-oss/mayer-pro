<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Звіт Mayer v7.8</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; padding: 10px; margin: 0; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .user-header { background: #f1f1f1; padding: 12px; border-radius: 10px; margin-bottom: 10px; font-size: 13px; border-left: 5px solid #71a95e; }
        .compact-dates { background: #fff9e6; padding: 8px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #ffeeba; display: flex; gap: 8px; justify-content: space-between; }
        .compact-dates > div { flex: 1; }
        .compact-dates label { margin-top: 0; font-size: 9px; font-weight: bold; text-transform: uppercase; }
        .compact-dates input { padding: 6px; font-size: 12px; text-align: center; border-radius: 5px; border: 1px solid #ccc; }
        label { display: block; font-weight: bold; margin-bottom: 4px; font-size: 10px; color: #555; text-transform: uppercase; line-height: 1.1; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .row { display: flex; gap: 10px; align-items: flex-end; margin-bottom: 12px; }
        .row > div { flex: 1; display: flex; flex-direction: column; }
        .car-box { text-align: center; background: #f9f9f9; padding: 8px; border-radius: 10px; border: 1px solid #eee; margin: 10px 0; }
        .gray-field { background: #f9f9f9; color: #444; border: 1px dashed #bbb; font-weight: bold; }
        .odo-section { background: #fdf2f2; padding: 10px; border-radius: 8px; border: 1px solid #f5c6cb; margin-bottom: 10px; }
        .fact-km { color: #d9534f; font-weight: bold; text-align: center; font-size: 12px; margin-top: 8px; }
        .btn-upload { background: #5d8aa8; padding: 10px; font-size: 12px; color: white; border: none; border-radius: 5px; width: 100%; cursor: pointer; font-weight: bold; }
        .finance-section { background: #f0f7ff; padding: 12px; border-radius: 10px; border: 1px solid #cce5ff; margin-top: 15px; }
        .total-box { background: #eef7ee; color: #2e7d32; border: 1px solid #2e7d32; padding: 12px; border-radius: 8px; text-align: center; margin-top: 10px; font-weight: bold; font-size: 18px; }
        .btn-save { width: 100%; padding: 15px; background: #71a95e; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; margin-top: 12px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <div class="user-header">
            <b>ПІБ:</b> <span id="pib">...</span><br>
            <b>Посада:</b> <span id="pos">...</span> | <b>Відділ:</b> <span id="vid">...</span>
        </div>

        <div class="compact-dates">
            <div><label>📅 ВИЇЗД</label><input type="text" id="date_start" class="gray-field" readonly></div>
            <div><label>📅 ПРИБУТТЯ</label><input type="text" id="date_end" class="gray-field" readonly></div>
            <div style="flex: 0.6;"><label>🔢 ДІБ</label><input type="text" id="days" class="gray-field" readonly></div>
        </div>

        <div class="car-box">
            <label style="margin-top:0;">🚗 СЛУЖБОВЕ АВТО</label>
            <input type="text" id="car_name" class="gray-field" readonly style="text-align: center; border: none; background: none;">
        </div>

        <div class="odo-section">
            <div class="row" style="margin-bottom: 0;">
                <div><label>📟 ОДО ВИЇЗД:</label><input type="number" id="o_start" class="gray-field" readonly></div>
                <div><label>🏁 ОДО ПРИБУТТЯ:</label><input type="number" id="o_end" class="gray-field" readonly></div>
            </div>
            <div id="km_fact" class="fact-km">ПРОБІГ ЗА ЖУРНАЛОМ: 0 КМ</div>
            <div style="margin-top:5px; text-align: center;">
                <label>⛽ ПАЛИВО ПО ЧЕКАМ (Л):</label>
                <input type="number" id="f_liters" class="gray-field" readonly style="width: 80px; text-align: center; color: #d9534f;">
            </div>
        </div>

        <div class="row">
            <div><label>🏨 ПРОЖИВАННЯ:</label><input type="number" id="hotel" value="0" oninput="calculate()"></div>
            <div><label>🍔 ДОБОВІ:</label><input type="number" id="per_diem" value="0" oninput="calculate()"></div>
        </div>

        <div class="row">
            <div><label>🚌 ТРАНСПОРТ:</label><input type="number" id="transport" value="0" oninput="calculate()"></div>
            <div><label>🛠️ ДОДАТКОВІ:</label><input type="number" id="extra" value="0" oninput="calculate()"></div>
        </div>

        <div class="row">
            <div style="flex: 1.5;"><label>📝 ПРИМІТКА:</label><textarea id="comment" rows="1"></textarea></div>
            <div><label>⛽ ЗАПРАВКА (ГРН):</label><input type="number" id="f_money" class="gray-field" readonly style="color: #2e7d32;"></div>
        </div>

        <div class="finance-section">
            <div class="row" style="margin-bottom: 0;">
                <div><label>💰 ОТРИМАНО:</label><input type="number" id="received" class="gray-field" readonly style="text-align: center;"></div>
                <div><label>💸 ФАКТИЧНО:</label><input type="number" id="actual" class="gray-field" readonly style="text-align: center;"></div>
            </div>
            <div id="balance_display" style="text-align: center; font-weight: bold; margin-top: 5px;">ЗАЛИШОК: 0 грн</div>
        </div>

        <div class="total-box" id="total_display">РАЗОМ ВИТРАТИ: 0 грн</div>

        <div class="row" style="margin-top: 10px;">
            <div><button type="button" class="btn-upload" onclick="document.getElementById('f1').click()">📁 ФАЙЛ</button><input type="file" id="f1" style="display:none" multiple onchange="updateFiles()"></div>
            <div><button type="button" class="btn-upload" onclick="document.getElementById('f2').click()">📷 ФОТО</button><input type="file" id="f2" accept="image/*" capture="camera" style="display:none" onchange="updateFiles()"></div>
        </div>
        <div id="file_status" style="font-size: 10px; text-align: center; color: #666; margin-top: 4px;">Файли не вибрані</div>

        <button class="btn-save" onclick="send()">💾 Надіслати звіт</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        const p = new URLSearchParams(window.location.search);

        document.getElementById('pib').innerText = p.get('pib') || '---';
        document.getElementById('pos').innerText = p.get('posada') || '---';
        document.getElementById('vid').innerText = p.get('viddil') || '---';
        document.getElementById('car_name').value = p.get('car') || '';
        document.getElementById('date_start').value = p.get('start') || '';
        document.getElementById('date_end').value = p.get('end') || '';
        document.getElementById('days').value = p.get('days') || '1';
        document.getElementById('received').value = p.get('received') || '0';

        // Дані Журналу
        const os = parseFloat(p.get('o_start')) || 0;
        const oe = parseFloat(p.get('o_end')) || 0;
        document.getElementById('o_start').value = os;
        document.getElementById('o_end').value = oe;
        document.getElementById('km_fact').innerText = `ПРОБІГ ЗА ЖУРНАЛОМ: ${oe - os} КМ`;
        document.getElementById('f_liters').value = p.get('f_liters') || '0';
        document.getElementById('f_money').value = p.get('f_money') || '0';

        function updateFiles() {
            const count = document.getElementById('f1').files.length + document.getElementById('f2').files.length;
            document.getElementById('file_status').innerText = count > 0 ? `✅ Додано файлів: ${count}` : "Файли не вибрані";
        }

        function calculate() {
            const hotel = parseFloat(document.getElementById('hotel').value) || 0;
            const perDiem = parseFloat(document.getElementById('per_diem').value) || 0;
            const transport = parseFloat(document.getElementById('transport').value) || 0;
            const extra = parseFloat(document.getElementById('extra').value) || 0;
            const fMoney = parseFloat(document.getElementById('f_money').value) || 0;
            const rec = parseFloat(document.getElementById('received').value) || 0;

            const total = hotel + perDiem + transport + extra + fMoney;
            const balance = rec - total;

            document.getElementById('actual').value = total.toFixed(2);
            document.getElementById('total_display').innerText = `РАЗОМ ВИТРАТИ: ${total.toFixed(2)} грн`;
            
            const bEl = document.getElementById('balance_display');
            bEl.style.color = balance < 0 ? "#d9534f" : "#2e7d32";
            bEl.innerText = balance < 0 ? `ПЕРЕВИТРАТА: ${Math.abs(balance).toFixed(2)} грн` : `ЗАЛИШОК: ${balance.toFixed(2)} грн`;
        }

        function send() {
            tg.sendData(JSON.stringify({
                trip_id: p.get('trip_id'),
                total: document.getElementById('actual').value,
                comment: document.getElementById('comment').value
            }));
            tg.close();
        }
        calculate();
    </script>
</body>
</html>
