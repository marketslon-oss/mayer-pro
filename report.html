<body>
    <div class="card">
        <div class="user-header">
            <b>ЗВІТ:</b> <span id="pib_label">...</span><br>
            <b>Поїздка №:</b> <span id="trip_id_label">...</span>
        </div>

        <input type="hidden" id="trip_id">
        <label>🏁 МАРШРУТ (З ПЛАНУ):</label>
        <input type="text" id="destination" readonly style="background:#f0f0f0;">

        <label>🚗 ОДОМЕТР (КМ):</label>
        <div class="row">
            <div><input type="number" id="odo_start" placeholder="Виїзд"></div>
            <div><input type="number" id="odo_end" placeholder="Прибуття"></div>
        </div>
        
        <button class="btn-report" onclick="validateAndSend()">💾 Надіслати звіт</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Автопідстановка даних з URL
        const params = new URLSearchParams(window.location.search);
        const pib = params.get('pib') || 'Користувач';
        const trip_id = params.get('trip_id') || '';
        const dest = params.get('dest') || '';

        document.getElementById('pib_label').innerText = pib;
        document.getElementById('trip_id_label').innerText = trip_id;
        document.getElementById('trip_id').value = trip_id;
        document.getElementById('destination').value = dest;

        function validateAndSend() {
            // Логіка відправки JSON через tg.sendData (як у плані)
            // ...
        }
    </script>
</body>
